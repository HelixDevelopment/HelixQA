name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # HelixQA depends on sibling modules via replace directives in go.mod:
      #   digital.vasic.challenges => ../Challenges
      #   digital.vasic.containers => ../Containers
      #   digital.vasic.docprocessor => ../../DocProcessor
      #   digital.vasic.llmorchestrator => ../../LLMOrchestrator
      #   digital.vasic.visionengine => ../../VisionEngine
      #
      # In CI, these paths don't exist. We check out dependencies to match
      # the expected relative paths. HelixQA is checked out into Yole/HelixQA,
      # and sibling modules are cloned accordingly.

      - name: Checkout Challenges (sibling submodule)
        uses: actions/checkout@v4
        with:
          repository: vasic-digital/Challenges
          path: ../Challenges

      - name: Checkout Containers (sibling submodule)
        uses: actions/checkout@v4
        with:
          repository: vasic-digital/Containers
          path: ../Containers

      - name: Checkout DocProcessor
        uses: actions/checkout@v4
        with:
          repository: vasic-digital/DocProcessor
          path: ../../DocProcessor

      - name: Checkout LLMOrchestrator
        uses: actions/checkout@v4
        with:
          repository: vasic-digital/LLMOrchestrator
          path: ../../LLMOrchestrator

      - name: Checkout VisionEngine
        uses: actions/checkout@v4
        with:
          repository: vasic-digital/VisionEngine
          path: ../../VisionEngine

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - run: go vet ./...
      - run: go test ./... -race -count=1 -timeout 180s
      - run: go build ./...
