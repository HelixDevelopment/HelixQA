//
// P5.6 schema — NOT compiled in P5.5. In P5.5 the Go encoder sends
// google.protobuf.Empty as a placeholder. Replace with real generated
// bindings once thinker.local sidecar (P5.6) is wired.
//
// To generate Go bindings (P5.6 operator step):
//   protoc --go_out=. --go-grpc_out=. nvenc.proto

syntax = "proto3";

package nvenc;

import "google/protobuf/empty.proto";

option go_package = "digital.vasic.helixqa/pkg/nexus/record/encoder/nvenc/proto;nvencpb";

// NVENCRequest carries one raw BGRA frame to the thinker.local sidecar.
// Width * Height * 4 == len(bgra_data).
message NVENCRequest {
  uint64 seq        = 1; // monotonic frame counter
  uint32 width      = 2;
  uint32 height     = 3;
  bytes  bgra_data  = 4; // raw BGRA8 pixel data
}

// NVENCResponse is the sidecar acknowledgement. The encoded H.264/HEVC
// bitstream is streamed back over a server-side stream (not shown here)
// to avoid doubling latency on the RPC round-trip.
message NVENCResponse {
  bool   accepted = 1;
  string error    = 2; // non-empty when accepted == false
}

// NVENCService is the gRPC service implemented by the thinker.local sidecar.
// P5.6 implements this; P5.5 sends google.protobuf.Empty as a placeholder.
service NVENCService {
  rpc Encode(NVENCRequest) returns (NVENCResponse);
}
