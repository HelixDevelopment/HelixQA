        expected: "coverage ≥ 95.0%"
      - name: "Phase-2 bank has all pHash entries"
        action: "helixqa list --banks banks/phase2-gocore.yaml"
        expected: "44 test cases total (prior 41 + 3 pHash)"
      - name: "DCT fundamental property: constant input → only DC coefficient"
        action: "go test -mod=vendor -count=1 -run TestDCT32_ConstantInputHasOnlyDC ./pkg/vision/hash/..."
