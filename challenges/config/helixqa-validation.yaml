        expected: "13 test cases total (6 DHASH + 2 BOCPD + 2 STAGNATION + 3 PIXELMATCH)"
      - name: "YIQ + AA math is correct"
        action: "go test -mod=vendor -count=1 -run 'TestColorDelta|TestRGB2YIQ|TestBlendWhite|TestIsAA|TestHasManySiblings' ./pkg/regression/..."
        expected: "All PASS"
    tags: [phase2, gocore, regression, pixelmatch, visual-diff]

  - id: HQA-PHASE2-GOCORE-009
    name: "OpenClawing4 Phase 2 Go-core — CIEDE2000 color delta + brand compliance"
    category: regression
