        action: "go test -mod=vendor -count=1 -run TestReport_Render_HappyPath ./pkg/regression/..."
        expected: "PASS — output contains 'data:image/png;base64,' (unescaped)"
      - name: "Phase-2 bank has all reporter entries"
        action: "helixqa list --banks banks/phase2-gocore.yaml"
        expected: "41 test cases total (prior 37 + 4 reporter)"
    tags: [phase2, gocore, regression, report, html, regression]

  - id: HQA-PHASE2-GOCORE-011
    name: "OpenClawing4 Phase 2 Go-core — pHash DCT-based perceptual hash"
