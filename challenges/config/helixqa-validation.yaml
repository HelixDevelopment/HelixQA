        action: "go test -mod=vendor -count=1 -cover ./pkg/regression/..."
        expected: "coverage ≥ 95.0% of statements (package-wide)"
      - name: "Phase-2 bank has all deltae entries"
        action: "helixqa list --banks banks/phase2-gocore.yaml"
        expected: "37 test cases total (prior 34 + 3 deltae)"
      - name: "Sharma 2005 reference table reproduced within ±0.01 ΔE"
        action: "go test -mod=vendor -count=1 -run TestDeltaE2000_SharmaReferenceValues ./pkg/regression/..."
        expected: "PASS — 10 canonical reference pairs match"
    tags: [phase2, gocore, regression, deltae, ciede2000, brand-compliance, regression]

  - id: HQA-PHASE2-GOCORE-010
    name: "OpenClawing4 Phase 2 Go-core — HTML visual-regression reporter"
    category: regression
