#
# HelixQA Test Bank: HelixAgent Tested by CLI Agents
# CLI agents (Claude Code, Aider, OpenHands, etc.) are the primary test executors
# for validating HelixAgent's ensemble LLM system, API endpoints, and features.

version: "1.0"
name: "HelixAgent CLI Agent Test Executor Bank"
description: "HelixAgent system validation using CLI agents as primary test executors"
metadata:
  author: "vasic-digital"
  app: "HelixAgent"
  version: "1.0.0"
  test_executor: "cli_agents"
  executor_agents:
    - claude_code
    - aider
    - openhands
    - codex
    - cline

test_cases:
  # ==================== Ensemble LLM Core ====================
  - id: HA-ENS-001
    name: "CLI agent tests ensemble completion endpoint"
    category: functional
    priority: critical
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "Agent calls /v1/ensemble/completions"
        action: "claude_code.Execute('bash', {command: 'curl -X POST http://localhost:8100/v1/ensemble/completions -H \"Content-Type: application/json\" -d '{\"model\":\"ensemble\",\"messages\":[{\"role\":\"user\",\"content\":\"Hello\"}]}'"})"
        expected: "HTTP 200 with ensemble response from multiple providers"
      - name: "Verify multiple provider responses"
        action: "Parse response JSON, check 'responses' array length >= 2"
        expected: "Contains responses from multiple LLM providers"
      - name: "Check consensus scoring"
        action: "Verify 'consensus_score' field exists"
        expected: "Score between 0.0 and 1.0"
    tags: [ensemble, completion, api, claude_code]
    estimated_duration: "30s"
    expected_result: "Ensemble returns aggregated multi-provider response"

  - id: HA-ENS-002
    name: "Aider tests ensemble with code generation task"
    category: functional
    priority: critical
    platforms: [api]
    executor_agent: aider
    steps:
      - name: "Aider sends code generation request"
        action: "POST /v1/ensemble/completions with code task"
        expected: "Returns generated code from ensemble"
      - name: "Verify code quality"
        action: "Aider analyzes response for syntax correctness"
        expected: "Code compiles/validates successfully"
    tags: [ensemble, code-generation, aider]
    estimated_duration: "45s"
    expected_result: "Ensemble generates valid code"

  - id: HA-ENS-003
    name: "OpenHands tests streaming ensemble endpoint"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: openhands
    steps:
      - name: "OpenHands connects to streaming endpoint"
        action: "POST /v1/completions/stream with streaming enabled"
        expected: "SSE stream established"
      - name: "Verify streaming chunks"
        action: "Read and aggregate stream chunks"
        expected: "Complete response assembled from chunks"
      - name: "Check final response"
        action: "Validate complete response format"
        expected: "Valid JSON with full completion"
    tags: [ensemble, streaming, openhands]
    estimated_duration: "60s"
    expected_result: "Streaming ensemble works correctly"

  # ==================== Provider Registry ====================
  - id: HA-PROV-001
    name: "Claude Code tests provider listing"
    category: functional
    priority: critical
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "Agent queries /v1/providers"
        action: "GET /v1/providers"
        expected: "Returns list of configured providers (Claude, DeepSeek, Gemini, etc.)"
      - name: "Verify provider count"
        action: "Count providers in response"
        expected: "22+ providers listed"
      - name: "Check provider status"
        action: "Verify each provider has 'available' status"
        expected: "All configured providers marked available"
    tags: [providers, registry, claude_code]
    estimated_duration: "15s"
    expected_result: "All 22+ LLM providers registered and available"

  - id: HA-PROV-002
    name: "Cline tests individual provider health"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: cline
    steps:
      - name: "Get provider list"
        action: "GET /v1/providers"
        expected: "List of providers"
      - name: "Test each provider health"
        action: "For each provider: GET /v1/providers/{name}/health"
        expected: "200 OK for available providers"
      - name: "Verify health details"
        action: "Check response contains latency, status"
        expected: "Health metrics present"
    tags: [providers, health, cline]
    estimated_duration: "30s"
    expected_result: "All providers report healthy status"

  - id: HA-PROV-003
    name: "Aider tests provider fallback"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: aider
    steps:
      - name: "Request with specific provider"
        action: "POST /v1/completions with provider='test-provider'"
        expected: "If unavailable, falls back to next provider"
      - name: "Verify fallback occurred"
        action: "Check response metadata for actual provider used"
        expected: "Different provider than requested but valid response"
    tags: [providers, fallback, aider]
    estimated_duration: "30s"
    expected_result: "Provider fallback mechanism works"

  # ==================== MCP Integration ====================
  - id: HA-MCP-001
    name: "Claude Code tests MCP server initialization"
    category: functional
    priority: critical
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "Agent calls /v1/mcp/initialize"
        action: "POST /v1/mcp/initialize with protocolVersion='2024-11-05'"
        expected: "Returns InitializeResult with server capabilities"
      - name: "Verify server info"
        action: "Check serverInfo.name and version"
        expected: "HelixAgent MCP server identified"
      - name: "Check capabilities"
        action: "Verify capabilities.tools, resources, prompts"
        expected: "All MCP capabilities listed"
    tags: [mcp, initialization, claude_code]
    estimated_duration: "15s"
    expected_result: "MCP server initializes with full capabilities"

  - id: HA-MCP-002
    name: "Claude Code tests MCP tools/list"
    category: functional
    priority: critical
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "List available tools"
        action: "POST /v1/mcp/tools/list"
        expected: "Returns ListToolsResult with 45+ tools"
      - name: "Verify tool schemas"
        action: "Check each tool has name, description, inputSchema"
        expected: "All tools properly defined"
      - name: "Test specific tool"
        action: "Verify 'read_file' tool exists with file_path parameter"
        expected: "File operations tool available"
    tags: [mcp, tools, claude_code]
    estimated_duration: "20s"
    expected_result: "45+ MCP tools available via HelixAgent"

  - id: HA-MCP-003
    name: "OpenHands tests MCP tool execution"
    category: functional
    priority: critical
    platforms: [api]
    executor_agent: openhands
    steps:
      - name: "Call read_file tool"
        action: "POST /v1/mcp/tools/call with name='read_file', arguments={file_path: '/etc/os-release'}"
        expected: "Returns ToolCallResult with file content"
      - name: "Call bash tool"
        action: "Call tools/call with name='bash', arguments={command: 'pwd'}"
        expected: "Returns current working directory"
      - name: "Verify tool result format"
        action: "Check content array with type='text'"
        expected: "Valid MCP tool result format"
    tags: [mcp, tools, execution, openhands]
    estimated_duration: "30s"
    expected_result: "MCP tools execute and return results"

  - id: HA-MCP-004
    name: "Claude Code tests MCP resources"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "List resources"
        action: "POST /v1/mcp/resources/list"
        expected: "Returns available resources"
      - name: "Read resource"
        action: "POST /v1/mcp/resources/read with uri"
        expected: "Returns resource content"
      - name: "Subscribe to resource"
        action: "POST /v1/mcp/resources/subscribe if supported"
        expected: "Subscription established"
    tags: [mcp, resources, claude_code]
    estimated_duration: "25s"
    expected_result: "MCP resources accessible"

  - id: HA-MCP-005
    name: "Aider tests MCP prompts"
    category: functional
    priority: medium
    platforms: [api]
    executor_agent: aider
    steps:
      - name: "List prompts"
        action: "POST /v1/mcp/prompts/list"
        expected: "Returns available prompts"
      - name: "Get prompt"
        action: "POST /v1/mcp/prompts/get with prompt name"
        expected: "Returns prompt messages"
      - name: "Use prompt for completion"
        action: "Send prompt to completion endpoint"
        expected: "Valid completion using prompt"
    tags: [mcp, prompts, aider]
    estimated_duration: "30s"
    expected_result: "MCP prompts functional"

  # ==================== Debate Orchestrator ====================
  - id: HA-DEBATE-001
    name: "Claude Code tests debate initiation"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "Start debate session"
        action: "POST /v1/debate/start with topic and agent configurations"
        expected: "Returns debate_id and session info"
      - name: "Verify debate topology"
        action: "Check topology field (mesh, star, chain)"
        expected: "Valid topology configured"
      - name: "Check participating agents"
        action: "Verify agents array with roles"
        expected: "Multiple agents assigned to debate"
    tags: [debate, orchestration, claude_code]
    estimated_duration: "30s"
    expected_result: "Debate session initializes with multiple agents"

  - id: HA-DEBATE-002
    name: "Aider tests debate execution"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: aider
    steps:
      - name: "Execute debate rounds"
        action: "POST /v1/debate/{id}/step for multiple rounds"
        expected: "Each round returns agent responses"
      - name: "Verify debate progression"
        action: "Check round number increments"
        expected: "Sequential rounds executed"
      - name: "Check consensus"
        action: "Query /v1/debate/{id}/consensus"
        expected: "Returns consensus score and winning position"
    tags: [debate, execution, aider]
    estimated_duration: "60s"
    expected_result: "Multi-round debate executes and reaches consensus"

  - id: HA-DEBATE-003
    name: "OpenHands tests debate streaming"
    category: functional
    priority: medium
    platforms: [api]
    executor_agent: openhands
    steps:
      - name: "Connect to debate stream"
        action: "WebSocket or SSE to /v1/debate/{id}/stream"
        expected: "Stream connection established"
      - name: "Watch real-time debate"
        action: "Receive debate events in real-time"
        expected: "Events for each agent response"
      - name: "Verify final result"
        action: "Wait for debate complete event"
        expected: "Final consensus delivered via stream"
    tags: [debate, streaming, openhands]
    estimated_duration: "90s"
    expected_result: "Real-time debate streaming works"

  # ==================== Container Orchestration ====================
  - id: HA-CONT-001
    name: "Claude Code tests lazy container startup"
    category: functional
    priority: critical
    platforms: [api, cli]
    executor_agent: claude_code
    steps:
      - name: "Check initial container status"
        action: "Query container status before access"
        expected: "NVIDIA RAG containers not running"
      - name: "Trigger service access"
        action: "Call endpoint requiring NVIDIA RAG"
        expected: "LazyContainerOrchestrator.EnsureService() called"
      - name: "Verify container started"
        action: "Check container status after access"
        expected: "Required containers now running"
    tags: [containers, lazy-startup, nvidia-rag, claude_code]
    estimated_duration: "120s"
    expected_result: "Containers start on-demand when service accessed"

  - id: HA-CONT-002
    name: "Aider tests container health checks"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: aider
    steps:
      - name: "Start containers"
        action: "Trigger container startup"
        expected: "Containers starting"
      - name: "Poll health endpoint"
        action: "GET /v1/health and check container services"
        expected: "Health shows container services status"
      - name: "Verify health checks pass"
        action: "Wait for all health checks to pass"
        expected: "All services healthy"
    tags: [containers, health, aider]
    estimated_duration: "60s"
    expected_result: "Container health monitoring works"

  - id: HA-CONT-003
    name: "OpenHands tests container profiles"
    category: functional
    priority: medium
    platforms: [api]
    executor_agent: openhands
    steps:
      - name: "Test local-gpu profile"
        action: "Configure NVIDIA_RAG_PROFILE=local-gpu, trigger service"
        expected: "Local GPU containers started"
      - name: "Test hybrid profile"
        action: "Switch to hybrid profile"
        expected: "Cloud APIs used for models, local for vector DB"
      - name: "Test opensource profile"
        action: "Switch to opensource profile"
        expected: "Open source alternatives deployed"
    tags: [containers, profiles, nvidia-rag, openhands]
    estimated_duration: "180s"
    expected_result: "All container profiles deploy correctly"

  # ==================== Authentication & Security ====================
  - id: HA-AUTH-001
    name: "Claude Code tests JWT authentication"
    category: security
    priority: critical
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "Request without token"
        action: "GET /v1/models without Authorization header"
        expected: "401 Unauthorized"
      - name: "Login and get token"
        action: "POST /v1/auth/login with credentials"
        expected: "200 OK with JWT token"
      - name: "Access with token"
        action: "Repeat request with Bearer token"
        expected: "200 OK with models list"
    tags: [auth, jwt, security, claude_code]
    estimated_duration: "20s"
    expected_result: "JWT authentication protects endpoints"

  - id: HA-AUTH-002
    name: "Cline tests rate limiting"
    category: security
    priority: high
    platforms: [api]
    executor_agent: cline
    steps:
      - name: "Send requests within limit"
        action: "Send 10 requests rapidly"
        expected: "All succeed (200)"
      - name: "Exceed rate limit"
        action: "Send 1000 requests rapidly"
        expected: "429 Too Many Requests returned"
      - name: "Check Retry-After header"
        action: "Inspect 429 response headers"
        expected: "Retry-After header present"
    tags: [security, rate-limiting, cline]
    estimated_duration: "30s"
    expected_result: "Rate limiting enforced"

  # ==================== LLM Verifier ====================
  - id: HA-VERIFY-001
    name: "Aider tests LLM response verification"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: aider
    steps:
      - name: "Request with verification"
        action: "POST /v1/completions with verify=true"
        expected: "Response includes verification metadata"
      - name: "Check verification score"
        action: "Verify 'verification_score' field"
        expected: "Score between 0.0 and 1.0"
      - name: "Check factual accuracy"
        action: "For factual query, verify against sources"
        expected: "High accuracy score for correct facts"
    tags: [llm, verification, scoring, aider]
    estimated_duration: "45s"
    expected_result: "LLM responses verified for quality"

  # ==================== Memory System ====================
  - id: HA-MEM-001
    name: "Claude Code tests conversation memory"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "Start conversation"
        action: "POST /v1/chat/completions with session_id"
        expected: "Response with session context"
      - name: "Send follow-up message"
        action: "Send message referencing previous context"
        expected: "Model remembers context from earlier"
      - name: "Verify memory persistence"
        action: "Query /v1/sessions/{id}/context"
        expected: "Full conversation history available"
    tags: [memory, conversation, context, claude_code]
    estimated_duration: "30s"
    expected_result: "Conversation memory persists across calls"

  - id: HA-MEM-002
    name: "OpenHands tests HelixMemory"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: openhands
    steps:
      - name: "Store memory"
        action: "POST /v1/memory/store with key, value, session_id"
        expected: "Memory stored successfully"
      - name: "Retrieve memory"
        action: "GET /v1/memory/retrieve with key"
        expected: "Returns stored value"
      - name: "Search memory"
        action: "POST /v1/memory/search with query"
        expected: "Relevant memories returned"
    tags: [memory, helixmemory, openhands]
    estimated_duration: "30s"
    expected_result: "HelixMemory storage and retrieval works"

  # ==================== RAG Integration ====================
  - id: HA-RAG-001
    name: "Claude Code tests RAG pipeline"
    category: functional
    priority: critical
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "Upload documents"
        action: "POST /v1/rag/documents with files"
        expected: "Documents indexed successfully"
      - name: "Query RAG"
        action: "POST /v1/rag/query with question"
        expected: "Returns answer with sources"
      - name: "Verify citations"
        action: "Check response contains document citations"
        expected: "Source documents referenced"
    tags: [rag, documents, query, claude_code]
    estimated_duration: "60s"
    expected_result: "RAG retrieves and cites relevant documents"

  - id: HA-RAG-002
    name: "Aider tests NVIDIA RAG with NeMo"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: aider
    steps:
      - name: "Ensure NVIDIA RAG containers running"
        action: "Trigger lazy startup or verify running"
        expected: "NeMo Retriever, Nemotron models available"
      - name: "Send document to embed"
        action: "POST /v1/rag/embed with document"
        expected: "Nemotron embed generates embeddings"
      - name: "Query with reranking"
        action: "Query with rerank=true"
        expected: "Nemotron reranker improves results"
    tags: [rag, nvidia, nemo, nemotron, aider]
    estimated_duration: "90s"
    expected_result: "NVIDIA RAG pipeline with NeMo works"

  # ==================== Metrics & Observability ====================
  - id: HA-METRICS-001
    name: "Cline tests Prometheus metrics"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: cline
    steps:
      - name: "Request metrics"
        action: "GET /metrics"
        expected: "Returns Prometheus format metrics"
      - name: "Check request counters"
        action: "Search for 'http_requests_total'"
        expected: "Counter present with method, status labels"
      - name: "Check latency histograms"
        action: "Search for 'http_request_duration_seconds'"
        expected: "Histogram buckets present"
    tags: [metrics, prometheus, observability, cline]
    estimated_duration: "20s"
    expected_result: "Prometheus metrics exposed correctly"

  - id: HA-METRICS-002
    name: "Aider tests structured logging"
    category: functional
    priority: medium
    platforms: [api, cli]
    executor_agent: aider
    steps:
      - name: "Check log format"
        action: "View helixagent logs"
        expected: "JSON structured logs"
      - name: "Verify log fields"
        action: "Check for level, timestamp, message, trace_id"
        expected: "All standard fields present"
      - name: "Test log levels"
        action: "Set LOG_LEVEL=debug, trigger operations"
        expected: "Debug logs visible"
    tags: [logging, observability, aider]
    estimated_duration: "30s"
    expected_result: "Structured logging operational"

  # ==================== Performance ====================
  - id: HA-PERF-001
    name: "Claude Code tests ensemble latency"
    category: performance
    priority: high
    platforms: [api]
    executor_agent: claude_code
    steps:
      - name: "Measure cold start latency"
        action: "First request to /v1/ensemble/completions"
        expected: "Response within 5 seconds"
      - name: "Measure warm latency"
        action: "Subsequent requests"
        expected: "P95 < 2 seconds"
      - name: "Load test"
        action: "Send 100 concurrent requests"
        expected: "All complete without timeout"
    tags: [performance, latency, ensemble, claude_code]
    estimated_duration: "120s"
    expected_result: "Ensemble responds within SLA"

  - id: HA-PERF-002
    name: "OpenHands tests streaming throughput"
    category: performance
    priority: high
    platforms: [api]
    executor_agent: openhands
    steps:
      - name: "Measure streaming chunks"
        action: "Stream large completion, count chunks"
        expected: "Reasonable chunk size (50-500 chars)"
      - name: "Measure time to first token"
        action: "TTFM measurement"
        expected: "< 500ms"
      - name: "Measure total stream time"
        action: "Time full streaming response"
        expected: "Comparable to non-streaming"
    tags: [performance, streaming, throughput, openhands]
    estimated_duration: "90s"
    expected_result: "Streaming performance acceptable"

  # ==================== Error Handling ====================
  - id: HA-ERROR-001
    name: "Cline tests graceful degradation"
    category: functional
    priority: high
    platforms: [api]
    executor_agent: cline
    steps:
      - name: "Simulate provider failure"
        action: "Configure invalid provider endpoint"
        expected: "Provider marked unavailable"
      - name: "Request with failed provider"
        action: "Send request that would use failed provider"
        expected: "Automatically uses alternative provider"
      - name: "Verify service continues"
        action: "Service remains operational"
        expected: "No downtime, degraded but functional"
    tags: [error-handling, resilience, cline]
    estimated_duration: "60s"
    expected_result: "System degrades gracefully"

  # ==================== Multi-Provider ====================
  - id: HA-MULTI-001
    name: "Aider tests all 22 providers simultaneously"
    category: functional
    priority: critical
    platforms: [api]
    executor_agent: aider
    steps:
      - name: "Get all providers"
        action: "GET /v1/providers"
        expected: "22+ providers listed"
      - name: "Test each provider"
        action: "Send identical request to each provider"
        expected: "All return valid responses"
      - name: "Compare responses"
        action: "Analyze quality across providers"
        expected: "All functional, varying quality acceptable"
    tags: [multi-provider, all-providers, aider]
    estimated_duration: "120s"
    expected_result: "All 22+ providers operational"

  # ==================== E2E Workflows ====================
  - id: HA-E2E-001
    name: "Claude Code tests full coding workflow"
    category: e2e
    priority: critical
    platforms: [api, cli]
    executor_agent: claude_code
    steps:
      - name: "Generate code"
        action: "Request code generation from ensemble"
        expected: "Working code returned"
      - name: "Review code via debate"
        action: "Submit code to /v1/debate for review"
        expected: "Multiple agents review and suggest improvements"
      - name: "Verify code"
        action: "Run tests on generated code"
        expected: "Tests pass"
    tags: [e2e, workflow, code-generation, debate, claude_code]
    estimated_duration: "180s"
    expected_result: "Complete coding workflow successful"

  - id: HA-E2E-002
    name: "OpenHands tests document analysis workflow"
    category: e2e
    priority: high
    platforms: [api]
    executor_agent: openhands
    steps:
      - name: "Upload document to RAG"
        action: "POST document to /v1/rag/documents"
        expected: "Indexed successfully"
      - name: "Query document"
        action: "Ask questions about content"
        expected: "Accurate answers with citations"
      - name: "Generate summary"
        action: "Request summary via ensemble"
        expected: "Concise summary generated"
      - name: "Store in memory"
        action: "Save key findings to HelixMemory"
        expected: "Available for future queries"
    tags: [e2e, workflow, rag, memory, openhands]
    estimated_duration: "150s"
    expected_result: "Document analysis workflow complete"
