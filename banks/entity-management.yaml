# HelixQA Test Bank: Entity Management
# Tests entity CRUD, hierarchy, search, duplicate detection, metadata,
# browsing, filtering, pagination, and statistics across all media types.

version: "1.0"
name: "Catalogizer Entity Management Test Bank"
description: "Entity management tests for CRUD, hierarchy, search, duplicates, metadata, browsing, filtering, and statistics"
metadata:
  author: "vasic-digital"
  app: "Catalogizer"
  version: "1.0.0"

test_cases:
  # ==================== Entity Creation by Media Type ====================
  - id: ENT-001
    name: "Create movie entity"
    category: functional
    priority: critical
    platforms: [api, web, desktop]
    steps:
      - name: "Send create entity request"
        action: "POST /api/v1/entities with type 'movie', title 'Test Movie', year 2025"
        expected: "201 Created with entity ID in response body"
      - name: "Verify entity exists"
        action: "GET /api/v1/entities/{id}"
        expected: "Entity returned with correct title, type, and year"
    tags: [entity, create, movie, crud]
    estimated_duration: "10s"
    expected_result: "Movie entity created and retrievable"

  - id: ENT-002
    name: "Create TV show entity"
    category: functional
