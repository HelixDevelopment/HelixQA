      - name: "Verify entity type"
        action: "GET /api/v1/entities/{id}"
        expected: "Entity type is 'tv_show'"
    tags: [entity, create, tv-show, crud]
    estimated_duration: "10s"
    expected_result: "TV show entity created successfully"

