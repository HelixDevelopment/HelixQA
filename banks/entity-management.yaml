      - name: "Verify parent link"
        action: "GET /api/v1/entities/{season_id}"
        expected: "Entity type is 'tv_season' with parent_id referencing the TV show"
    tags: [entity, create, tv-season, hierarchy, crud]
    estimated_duration: "15s"
