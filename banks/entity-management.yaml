    tags: [entity, create, validation, error, missing-field]
    estimated_duration: "5s"
    expected_result: "Missing title rejected with validation error"

  # ==================== Entity Hierarchy ====================
  - id: ENT-014
    name: "Full TV show hierarchy: show to season to episode"
    category: functional
    priority: critical
    platforms: [api, web, desktop]
    steps:
      - name: "Create TV show"
        action: "POST /api/v1/entities with type 'tv_show', title 'Breaking Bad'"
        expected: "201 Created"
      - name: "Create Season 1"
        action: "POST /api/v1/entities with type 'tv_season', title 'Season 1', parent_id = show ID"
        expected: "201 Created"
      - name: "Create Episode 1"
        action: "POST /api/v1/entities with type 'tv_episode', title 'Pilot', parent_id = season ID"
        expected: "201 Created"
      - name: "Query hierarchy"
        action: "GET /api/v1/entities/{show_id}/children"
        expected: "Season 1 listed as child"
      - name: "Query season children"
        action: "GET /api/v1/entities/{season_id}/children"
        expected: "Pilot episode listed as child"
    tags: [entity, hierarchy, tv-show, season, episode]
    estimated_duration: "25s"
    expected_result: "Three-level TV hierarchy navigable via parent-child queries"

  - id: ENT-015
    name: "Music hierarchy: artist to album to song"
    category: functional
    priority: critical
    platforms: [api, web, desktop]
    steps:
      - name: "Create music artist"
        action: "POST /api/v1/entities with type 'music_artist', title 'The Beatles'"
        expected: "201 Created"
      - name: "Create album"
        action: "POST /api/v1/entities with type 'music_album', title 'Abbey Road', parent_id = artist ID"
        expected: "201 Created"
      - name: "Create song"
        action: "POST /api/v1/entities with type 'song', title 'Come Together', parent_id = album ID"
        expected: "201 Created"
      - name: "Traverse hierarchy"
        action: "GET /api/v1/entities/{artist_id}/children then GET children of album"
        expected: "Album under artist, song under album"
    tags: [entity, hierarchy, music, artist, album, song]
    estimated_duration: "25s"
    expected_result: "Three-level music hierarchy navigable"

  - id: ENT-016
    name: "Query children of entity with no children"
    category: functional
    priority: medium
    platforms: [api, web]
    steps:
      - name: "Create standalone movie"
        action: "POST /api/v1/entities with type 'movie', title 'Standalone Film'"
        expected: "201 Created"
      - name: "Query children"
        action: "GET /api/v1/entities/{id}/children"
        expected: "Empty array returned, not an error"
    tags: [entity, hierarchy, empty, edge-case]
    estimated_duration: "10s"
    expected_result: "Empty children list returned for leaf entities"

  - id: ENT-017
    name: "Multiple seasons under one TV show"
    category: functional
    priority: high
    platforms: [api, web, desktop]
    steps:
      - name: "Create TV show"
        action: "POST /api/v1/entities with type 'tv_show', title 'Multi-Season Show'"
        expected: "201 Created"
      - name: "Create Season 1"
        action: "POST /api/v1/entities with type 'tv_season', title 'Season 1', parent_id = show ID"
        expected: "201 Created"
      - name: "Create Season 2"
        action: "POST /api/v1/entities with type 'tv_season', title 'Season 2', parent_id = show ID"
        expected: "201 Created"
      - name: "Create Season 3"
        action: "POST /api/v1/entities with type 'tv_season', title 'Season 3', parent_id = show ID"
        expected: "201 Created"
      - name: "Query show children"
        action: "GET /api/v1/entities/{show_id}/children"
        expected: "Three seasons returned in order"
    tags: [entity, hierarchy, tv-show, multiple-children]
    estimated_duration: "20s"
    expected_result: "Multiple seasons listed under parent show"

  - id: ENT-018
    name: "Multiple episodes under one season"
    category: functional
    priority: high
    platforms: [api, web, desktop]
    steps:
      - name: "Create TV show and season"
        action: "Create show and Season 1 hierarchy"
        expected: "Show and season created"
      - name: "Create 5 episodes"
        action: "POST 5 episodes with parent_id = season ID, titles Episode 1 through 5"
        expected: "All 5 episodes created (201 for each)"
      - name: "Query season children"
        action: "GET /api/v1/entities/{season_id}/children"
        expected: "5 episodes returned"
    tags: [entity, hierarchy, tv-episode, bulk-create]
    estimated_duration: "25s"
    expected_result: "Multiple episodes listed under parent season"

  # ==================== Entity Search ====================
  - id: ENT-019
    name: "Search entities by title"
    category: functional
    priority: critical
    platforms: [api, web, desktop]
    steps:
      - name: "Create entities with known titles"
        action: "Create movie 'The Matrix' and book 'The Matrix Comics'"
        expected: "Both entities created"
      - name: "Search by title"
        action: "GET /api/v1/entities?search=Matrix"
        expected: "Both entities returned in results"
    tags: [entity, search, title, query]
    estimated_duration: "15s"
    expected_result: "Title search returns matching entities"

  - id: ENT-020
    name: "Search entities by type"
    category: functional
    priority: critical
    platforms: [api, web, desktop]
    steps:
      - name: "Create mixed entities"
        action: "Create 2 movies, 1 book, 1 game"
        expected: "All entities created"
      - name: "Filter by type movie"
        action: "GET /api/v1/entities?type=movie"
        expected: "Only movie entities returned"
    tags: [entity, search, type-filter, query]
    estimated_duration: "15s"
    expected_result: "Type filter returns only matching entities"

  - id: ENT-021
    name: "Search entities by year"
    category: functional
    priority: high
    platforms: [api, web, desktop]
    steps:
      - name: "Create entities with different years"
        action: "Create movie year 2020, movie year 2025, book year 2020"
        expected: "All entities created"
      - name: "Filter by year 2020"
        action: "GET /api/v1/entities?year=2020"
        expected: "Two entities (movie and book from 2020) returned"
    tags: [entity, search, year-filter, query]
    estimated_duration: "15s"
    expected_result: "Year filter returns matching entities"

  - id: ENT-022
    name: "Search with combined title and type filter"
    category: functional
    priority: high
    platforms: [api, web, desktop]
    steps:
      - name: "Create entities"
        action: "Create movie 'Inception', book 'Inception: The Art', game 'Inception'"
        expected: "Three entities created"
      - name: "Search title+type"
        action: "GET /api/v1/entities?search=Inception&type=movie"
        expected: "Only movie 'Inception' returned"
    tags: [entity, search, combined-filter, query]
    estimated_duration: "15s"
    expected_result: "Combined search narrows results correctly"

  - id: ENT-023
    name: "Search returns empty for non-existent title"
    category: functional
    priority: medium
    platforms: [api, web]
    steps:
      - name: "Search for non-existent title"
        action: "GET /api/v1/entities?search=XYZNonexistentTitle123"
        expected: "Empty result array, 200 OK"
    tags: [entity, search, empty-result, edge-case]
    estimated_duration: "5s"
    expected_result: "Empty array returned, not an error"

  - id: ENT-024
    name: "Search is case-insensitive"
    category: functional
    priority: medium
    platforms: [api, web]
    steps:
      - name: "Create entity with mixed case"
        action: "Create movie 'The Dark Knight'"
        expected: "Entity created"
      - name: "Search lowercase"
        action: "GET /api/v1/entities?search=the dark knight"
        expected: "Entity found regardless of case"
      - name: "Search uppercase"
        action: "GET /api/v1/entities?search=THE DARK KNIGHT"
        expected: "Same entity found"
    tags: [entity, search, case-insensitive, query]
    estimated_duration: "10s"
    expected_result: "Search is case-insensitive"

  # ==================== Entity Duplicate Detection ====================
  - id: ENT-025
    name: "Detect duplicate entity by title and type and year"
    category: functional
    priority: critical
    platforms: [api, web, desktop]
    steps:
      - name: "Create first entity"
        action: "POST /api/v1/entities with type 'movie', title 'Dune', year 2021"
        expected: "201 Created"
      - name: "Create duplicate"
        action: "POST /api/v1/entities with type 'movie', title 'Dune', year 2021"
        expected: "409 Conflict or warning indicating duplicate detected"
    tags: [entity, duplicate, detection, validation]
    estimated_duration: "10s"
    expected_result: "Duplicate entity detected and flagged"

  - id: ENT-026
    name: "Same title different type is not a duplicate"
    category: functional
    priority: high
    platforms: [api, web]
    steps:
      - name: "Create movie"
        action: "POST /api/v1/entities with type 'movie', title 'Dune'"
        expected: "201 Created"
      - name: "Create book with same title"
        action: "POST /api/v1/entities with type 'book', title 'Dune'"
        expected: "201 Created (not a duplicate since different type)"
    tags: [entity, duplicate, cross-type, validation]
    estimated_duration: "10s"
    expected_result: "Same title with different type allowed"

  - id: ENT-027
    name: "Same title different year is not a duplicate"
    category: functional
    priority: high
    platforms: [api, web]
    steps:
      - name: "Create movie 1984"
        action: "POST /api/v1/entities with type 'movie', title 'Dune', year 1984"
        expected: "201 Created"
      - name: "Create movie 2021"
        action: "POST /api/v1/entities with type 'movie', title 'Dune', year 2021"
        expected: "201 Created (different year, not a duplicate)"
    tags: [entity, duplicate, different-year, validation]
    estimated_duration: "10s"
    expected_result: "Same title with different year allowed as separate entity"

