    tags: [entity, update, title, crud]
    estimated_duration: "10s"
    expected_result: "Entity title updated successfully"

  - id: ENT-029
    name: "Update entity metadata"
    category: functional
    priority: high
    platforms: [api, web, desktop]
    steps:
      - name: "Create entity"
        action: "POST /api/v1/entities with type 'movie', title 'Metadata Test'"
        expected: "201 Created"
      - name: "Add metadata"
        action: "PUT /api/v1/entities/{id}/metadata with genre 'Sci-Fi', rating '8.5'"
        expected: "200 OK"
      - name: "Verify metadata"
        action: "GET /api/v1/entities/{id}"
        expected: "Metadata fields present with correct values"
    tags: [entity, update, metadata, crud]
    estimated_duration: "15s"
    expected_result: "Entity metadata updated and retrievable"

  - id: ENT-030
    name: "Update entity year"
    category: functional
    priority: medium
    platforms: [api, web]
    steps:
      - name: "Create entity with year"
        action: "POST /api/v1/entities with type 'movie', title 'Year Test', year 2020"
        expected: "201 Created"
      - name: "Update year"
        action: "PUT /api/v1/entities/{id} with year 2021"
        expected: "200 OK"
      - name: "Verify year"
        action: "GET /api/v1/entities/{id}"
        expected: "Year is 2021"
    tags: [entity, update, year, crud]
    estimated_duration: "10s"
    expected_result: "Entity year updated correctly"

  - id: ENT-031
    name: "Update non-existent entity returns 404"
    category: functional
    priority: medium
    platforms: [api, web]
    steps:
      - name: "Update non-existent entity"
        action: "PUT /api/v1/entities/99999 with title 'Ghost'"
        expected: "404 Not Found"
    tags: [entity, update, not-found, error]
    estimated_duration: "5s"
    expected_result: "404 returned for non-existent entity update"

  # ==================== Entity Deletion ====================
  - id: ENT-032
    name: "Delete entity"
    category: functional
    priority: critical
    platforms: [api, web, desktop]
    steps:
      - name: "Create entity"
        action: "POST /api/v1/entities with type 'game', title 'Delete Me'"
        expected: "201 Created"
      - name: "Delete entity"
        action: "DELETE /api/v1/entities/{id}"
        expected: "200 OK or 204 No Content"
      - name: "Verify deletion"
        action: "GET /api/v1/entities/{id}"
        expected: "404 Not Found"
    tags: [entity, delete, crud]
    estimated_duration: "10s"
    expected_result: "Entity deleted and no longer retrievable"

  - id: ENT-033
    name: "Delete parent entity cascades or blocks"
    category: functional
    priority: high
    platforms: [api, web]
    steps:
      - name: "Create TV show with season and episode"
        action: "Create full hierarchy: show > season > episode"
        expected: "All three entities created"
      - name: "Delete parent show"
        action: "DELETE /api/v1/entities/{show_id}"
        expected: "Either cascade deletes children or 409 Conflict if children exist"
      - name: "Verify outcome"
        action: "GET /api/v1/entities/{show_id} and GET children"
        expected: "Consistent state: all deleted or parent still present with error"
    tags: [entity, delete, cascade, hierarchy]
    estimated_duration: "20s"
    expected_result: "Parent deletion handled consistently with hierarchy"

  - id: ENT-034
    name: "Delete non-existent entity returns 404"
    category: functional
    priority: medium
    platforms: [api, web]
    steps:
      - name: "Delete non-existent entity"
        action: "DELETE /api/v1/entities/99999"
        expected: "404 Not Found"
    tags: [entity, delete, not-found, error]
    estimated_duration: "5s"
    expected_result: "404 returned for non-existent entity deletion"

  # ==================== Entity Browsing and Pagination ====================
  - id: ENT-035
    name: "Browse entities with default pagination"
    category: functional
    priority: critical
    platforms: [api, web, desktop]
    steps:
      - name: "Create 30 entities"
        action: "POST 30 movie entities with sequential titles"
        expected: "All 30 created"
      - name: "Browse first page"
        action: "GET /api/v1/entities?page=1&per_page=10"
        expected: "10 entities returned with pagination metadata"
      - name: "Verify pagination metadata"
        action: "Check response headers or body for total count and page info"
        expected: "Total count >= 30, page 1 of 3+"
    tags: [entity, browse, pagination, listing]
    estimated_duration: "30s"
    expected_result: "Paginated entity listing with correct counts"

