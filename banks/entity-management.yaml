    steps:
      - name: "Create parent TV season"
        action: "POST /api/v1/entities with type 'tv_season', title 'Season 1'"
        expected: "201 Created with season ID"
      - name: "Create TV episode"
        action: "POST /api/v1/entities with type 'tv_episode', title 'Pilot', parent_id set to season ID"
        expected: "201 Created with episode entity ID"
      - name: "Verify parent link"
        action: "GET /api/v1/entities/{episode_id}"
