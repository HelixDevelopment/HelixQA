#
# HelixQA fixes-validation bank — mobile domain.
# Regression cases for pkg/nexus/mobile and ADB/Appium adapters.

version: "1.0"
name: "HelixQA Fixes Validation — Mobile"
description: "Nexus mobile-layer regression suite. Empty-by-design for now — future mobile fixes land here with their fix_reference commits."
metadata:
  author: "vasic-digital"
  domain: "mobile"

test_cases:
  - id: FIX-MOBILE-001
    name: "Mobile Capabilities require Platform field"
    category: regression
    priority: high
    platforms: [android, ios]
    steps:
      - name: "mobile.NewEngine(appiumURL, Capabilities{})"
        action: "pkg/nexus/mobile.NewEngine"
        expected: "error: capabilities: platform is required"
      - name: "mobile.NewEngine(appiumURL, Capabilities{Platform: PlatformAndroid})"
        action: "pkg/nexus/mobile.NewEngine"
        expected: "non-nil Engine"
    expected_result: "Callers cannot accidentally spin up a mobile Engine without declaring Android vs iOS"
    fix_reference:
      id: W10-mobile
      file: "pkg/nexus/mobile/adapter.go"
      rationale: "Discovered during CLI W10 regression tests — engine now fails loudly on missing Platform instead of defaulting"
