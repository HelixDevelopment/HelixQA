        expected: "PASS on an operator desktop with AT-SPI2 running — skipped in CI"
      - name: "Snapshot of live tree returns ≥ 1 child"
        action: "Run the above with HELIXQA_AXTREE_SMOKE=1 set"
        expected: "Tree has ≥ 1 descendant reflecting the currently-focused app"
    tags: [phase2, axtree, atspi2, linux, integration, manual]

