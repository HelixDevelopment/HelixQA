#
# HelixQA Test Bank: OpenClawing4 Phase 2 Go-Core
#
# This bank validates the pure-Go perception / analysis / regression packages
# that land as Phase 2 progresses. Entries appear as the corresponding
# implementations ship — empty / commented rows are placeholders tracked in
# `docs/openclawing/OpenClawing4-Phase2-Kickoff.md` §3.
#
# Every test here runs on a clean Linux container — no GPU, no OpenCV, no
# Python sidecars, no native dependencies. GPU-gated flows live in their own
# bank once the sidecars are online.

version: "1.0"
name: "OpenClawing4 Phase 2 — Go core bank"
description: >
  Tier-1 / tier-2 perception primitives + analysis + regression, pure-Go
  subset. Backs the HQA-PHASE2-GOCORE-* challenges in
  `challenges/config/helixqa-validation.yaml`.

test_cases:
  # ─── M28 · pkg/vision/hash · DHash-64 / DHash-256 ───
  - id: PH2-HASH-DHASH-001
    name: "pkg/vision/hash — DHasher basic invariants"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Build + run tests with vendor mode"
        action: "GOTOOLCHAIN=local go test -mod=vendor ./pkg/vision/hash/..."
        expected: "PASS, 100% statement coverage"
      - name: "Verify identical inputs → distance zero"
        action: "TestDHash64_IdenticalImages_DistanceZero + TestDHash256_IdenticalImages_DistanceZero"
        expected: "Both PASS"
      - name: "Verify 1-pixel shift is absorbed"
        action: "TestDHash64_ShiftedByOnePixel_DistanceSmall"
        expected: "PASS (distance ≤ 8)"
      - name: "Verify different inputs → large distance"
        action: "TestDHash64_CompletelyDifferent_DistanceLarge + TestDHash256_CompletelyDifferent_DistanceLarge"
        expected: "PASS (distance ≥ 20 for DHash-64, ≥ 80 for DHash-256)"
    tags: [phase2, vision, hash, unit]

  - id: PH2-HASH-DHASH-002
    name: "pkg/vision/hash — wrong-kind + nil-input error sentinels"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "Hash on DHash256 hasher returns ErrWrongKind64"
        action: "TestHasher_WrongKind_Hash64OnDHash256Hasher"
        expected: "PASS"
      - name: "Hash256 on DHash64 hasher returns ErrWrongKind256"
        action: "TestHasher_WrongKind_Hash256OnDHash64Hasher"
        expected: "PASS"
      - name: "nil image → ErrNilImage"
        action: "TestHasher_NilImage_Hash + TestHasher_NilImage_Hash256"
        expected: "Both PASS"
      - name: "zero-bounds image → ErrZeroBounds"
        action: "TestHasher_ZeroBounds"
        expected: "PASS"
    tags: [phase2, vision, hash, error-paths]

  - id: PH2-HASH-DHASH-003
    name: "pkg/vision/hash — image-type coverage (RGBA / NRGBA / Gray / YCbCr / generic)"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "All four concrete fast-paths exercised"
        action: "TestDHash64_HandlesVariousImageTypes + TestDHash64_YCbCr + TestDHash64_GenericImageInterface"
        expected: "All PASS"
    tags: [phase2, vision, hash, coverage]

  - id: PH2-HASH-DHASH-004
    name: "pkg/vision/hash — Hasher interface conformance"
    category: unit
    priority: medium
    platforms: [linux]
    steps:
      - name: "DHasher{Kind: DHash64} satisfies hash.Hasher"
        action: "TestDHasher_SatisfiesHasherInterface + compile-time `var _ Hasher = DHasher{...}`"
        expected: "Build + test PASS"
    tags: [phase2, vision, hash, interface]

  - id: PH2-HASH-DHASH-005
    name: "pkg/vision/hash — BigHash.Distance symmetry + 64-bit Hamming examples"
    category: unit
    priority: medium
    platforms: [linux]
    steps:
      - name: "BigHash.Distance is symmetric"
        action: "TestBigHash_Distance_Symmetric"
        expected: "PASS"
      - name: "DHasher.Distance matches hand-computed Hamming weights"
        action: "TestDistance64_Examples"
        expected: "PASS for all table entries (0, 64, 64, 7)"
    tags: [phase2, vision, hash, math]

  - id: PH2-HASH-DHASH-006
    name: "pkg/vision/hash — Article V benchmarking: < 5 ms / 1080p frame"
    category: benchmark
    priority: critical
    platforms: [linux]
    steps:
      - name: "TestPerformance_DHash64_Under5msPer1080pFrame runs 20× averages"
        action: "go test -mod=vendor -run TestPerformance_DHash64_Under5msPer1080pFrame ./pkg/vision/hash/..."
        expected: "Average per-frame latency < 5 ms (target: ~1 µs on commodity CPU)"
      - name: "BenchmarkDHash64_1080p / BenchmarkDHash256_1080p"
        action: "go test -mod=vendor -bench=. -run=^$ ./pkg/vision/hash/..."
        expected: "DHash64 < 5 µs/op, DHash256 < 20 µs/op on AMD64"
    tags: [phase2, vision, hash, benchmark, article-v-8]

  # ─── M47 · pkg/nexus/observe/axtree/web.go · CDP web AX ───
  - id: PH2-AXTREE-WEB-001
    name: "pkg/nexus/observe/axtree — WebSnapshotter happy path"
    category: unit
    priority: critical
    platforms: [linux, web]
    steps:
      - name: "CDP AXNode list → Node tree, Platform=PlatformWeb"
        action: "TestWebSnapshotter_Snapshot_FullTree"
        expected: "PASS — 5 descendants, RootWebArea→document, RawID from CDP NodeID"
      - name: "Attributes translate (role, name, value, focused, disabled→Enabled inversion)"
        action: "TestWebSnapshotter_Snapshot_AttributesTranslated"
        expected: "PASS — button focused, textbox value=admin + enabled (disabled=false)"
      - name: "Multi-root trees (iframe boundaries) wrap in synthetic application root"
        action: "TestWebSnapshotter_Snapshot_MultiRootWrapped"
        expected: "PASS"
      - name: "Ignored nodes elided; grandchildren hoisted"
        action: "TestWebSnapshotter_Snapshot_IgnoredNodesHoistGrandchildren"
        expected: "PASS — CDP aria-hidden wrappers don't lose their nested content"
      - name: "Cycle guard prevents infinite recursion on malformed trees"
        action: "TestWebSnapshotter_Snapshot_CycleGuard"
        expected: "PASS — finite traversal even with a→b→a cycle"
      - name: "Snapshotter interface conformance"
        action: "TestWebSnapshotter_SatisfiesSnapshotterInterface"
        expected: "PASS"
    tags: [phase2, axtree, web, cdp, unit]

  - id: PH2-AXTREE-WEB-002
    name: "pkg/nexus/observe/axtree — CDP value/property decoding"
    category: unit
    priority: high
    platforms: [linux, web]
    steps:
      - name: "axValueString handles nil / empty / JSON-quoted / numeric forms"
        action: "TestAxValueString_Variants"
        expected: "PASS"
      - name: "axBoolProperty handles focused/selected/disabled with value unwrap"
        action: "TestAxBoolProperty"
        expected: "PASS — disabled=true maps to Enabled=false; missing prop → default; nil value → default"
      - name: "Role normalization: StaticText→text, RootWebArea/WebView→document, genericContainer→group, ARIA passthrough"
        action: "TestNormalizeWebRole"
        expected: "PASS — 7 role transitions verified"
    tags: [phase2, axtree, web, cdp, value-decoding]

  - id: PH2-AXTREE-WEB-003
    name: "pkg/nexus/observe/axtree — web error + lifecycle"
    category: unit
    priority: high
    platforms: [linux, web]
    steps:
      - name: "Empty node list + no-root tree → ErrNoRoot"
        action: "TestWebSnapshotter_Snapshot_EmptyTreeError + TestWebSnapshotter_Snapshot_NoRootNodeError"
        expected: "Both PASS"
      - name: "Fetcher error propagates"
        action: "TestWebSnapshotter_Snapshot_FetcherError"
        expected: "PASS"
      - name: "Canceled context bails out"
        action: "TestWebSnapshotter_Snapshot_ContextCanceled"
        expected: "PASS"
      - name: "Close is idempotent; Snapshot-after-Close returns ErrSnapshotClosed"
        action: "TestWebSnapshotter_Close_Idempotent + TestWebSnapshotter_Snapshot_AfterCloseReturnsError"
        expected: "Both PASS"
      - name: "ChromedpFetcher guards nil AllocCtx + Close-before-Fetch idempotent"
        action: "TestChromedpFetcher_NilAllocCtxError + TestChromedpFetcher_CloseIsIdempotent"
        expected: "Both PASS"
      - name: "NewWebSnapshotter wires ChromedpFetcher with allocator context"
        action: "TestNewWebSnapshotter_UsesChromedpFetcher"
        expected: "PASS"
    tags: [phase2, axtree, web, cdp, error-paths]

  # Production Chrome integration (blocked on operator-action per
  # OPEN_POINTS_CLOSURE.md §10.3 — Chrome/Chromium with remote
  # debugging enabled + a real page loaded).
  - id: PH2-AXTREE-WEB-INT-001
    name: "pkg/nexus/observe/axtree — live chromedp smoke test"
    category: integration
    priority: high
    platforms: [linux, web]
    requires: [chromium-with-remote-debugging]
    steps:
      - name: "ChromedpFetcher connects to a running Chromium and fetches AXTree"
        action: "chromedp.NewExecAllocator + NewWebSnapshotter → Snapshot"
        expected: "≥ 1 descendant for any loaded page"
    tags: [phase2, axtree, web, cdp, integration, manual]

  # ─── M45 · pkg/vision/hash · DCT-based pHash ───
  - id: PH2-PHASH-001
    name: "pkg/vision/hash — pHash identity + discrimination"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Identical images produce Hamming distance 0"
        action: "TestPHash_IdenticalImagesReturnZeroDistance"
        expected: "PASS"
      - name: "Uncorrelated images produce distance ≥ 15"
        action: "TestPHash_CompletelyDifferentImagesReturnLargeDistance"
        expected: "PASS — stays well below the 32-bit uncorrelated baseline but above noise"
      - name: "1-pixel shift on 512×384 source produces distance ≤ 16 (pHash shift-robustness)"
        action: "TestPHash_ShiftedImagesStillSimilar"
        expected: "PASS"
      - name: "Black vs white produce distinct hashes (DCT pipeline correctness)"
        action: "TestPHash_HammingPackedCorrectly"
        expected: "PASS"
      - name: "PHasher satisfies the Hasher interface"
        action: "TestPHash_SatisfiesHasherInterface"
        expected: "PASS — same contract as DHasher, swappable in call sites"
    tags: [phase2, vision, hash, phash, dct, unit]

  - id: PH2-PHASH-002
    name: "pkg/vision/hash — pHash DCT + error paths"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "DCT of constant image has only DC coefficient, all ACs zero"
        action: "TestDCT32_ConstantInputHasOnlyDC"
        expected: "PASS — fundamental DCT property"
      - name: "DCT panics on wrong-size input (internal invariant guard)"
        action: "TestDCT32_PanicsOnWrongSize"
        expected: "PASS"
      - name: "nil image → ErrNilImage; zero-bounds → ErrZeroBounds"
        action: "TestPHash_NilImageError + TestPHash_ZeroBoundsError"
        expected: "Both PASS"
      - name: "RGBA / NRGBA / Gray all produce stable self-hashes"
        action: "TestPHash_HandlesConcreteImageTypes"
        expected: "All 3 PASS"
    tags: [phase2, vision, hash, phash, dct, error-paths]

  - id: PH2-PHASH-003
    name: "pkg/vision/hash — pHash performance"
    category: benchmark
    priority: high
    platforms: [linux]
    steps:
      - name: "pHash runs < 25 ms / 1080p frame (typically ~175 µs on commodity CPU)"
        action: "TestPerformance_PHash_Under25msPer1080pFrame"
        expected: "PASS"
      - name: "BenchmarkPHash_1080p reports sub-millisecond operation"
        action: "go test -mod=vendor -bench=BenchmarkPHash_1080p -run=^$ ./pkg/vision/hash/..."
        expected: "~175 µs / op"
    tags: [phase2, vision, hash, phash, benchmark]

  # ─── M49 · pkg/vision/template · NCC matcher ───
  - id: PH2-TEMPLATE-001
    name: "pkg/vision/template — NCC finds embedded template at known location"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Exact embedded needle found with score ≈ 1 at the right coords"
        action: "TestMatch_ExactEmbeddedTemplateFoundAtKnownLocation"
        expected: "PASS — BBox.Min=(42, 37), Score ≥ 0.99"
      - name: "Absent template returns not-found (solid haystack has no signal)"
        action: "TestMatch_TemplateAbsentReturnsNotFound"
        expected: "PASS"
      - name: "Region.Center returns the bbox midpoint"
        action: "TestMatch_CenterReturnsBBoxMidpoint"
        expected: "PASS"
      - name: "Custom MinScore enforces strict vs loose thresholds consistently"
        action: "TestMatch_CustomMinScoreEnforced"
        expected: "PASS"
    tags: [phase2, vision, template, ncc, unit]

  - id: PH2-TEMPLATE-002
    name: "pkg/vision/template — degeneracies + error paths"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "Uniform needle (zero variance) gracefully returns not-found"
        action: "TestMatch_UniformNeedleReturnsNotFoundGracefully"
        expected: "PASS"
      - name: "Uniform haystack window produces score 0"
        action: "TestMatch_UniformHaystackWindowHasZeroScore"
        expected: "PASS"
      - name: "nil image / zero bounds / oversized needle return sentinels"
        action: "TestMatch_NilImageError + TestMatch_ZeroBoundsError + TestMatch_NeedleLargerThanHaystack"
        expected: "All PASS — ErrNilImage / ErrZeroBounds / ErrNeedleTooLarge"
      - name: "Canceled context bails out of the scan"
        action: "TestMatch_ContextCanceled"
        expected: "PASS"
      - name: "ncc zero-variance branch + rec709Luma black/white sanity"
        action: "TestNCC_ZeroHaystackVarianceReturnsZero + TestRec709Luma_BlackAndWhite"
        expected: "Both PASS"
    tags: [phase2, vision, template, ncc, error-paths]

  # ─── M46 · pkg/vision/hash · BlockMean + ChangedTiles ───
  - id: PH2-BLOCKMEAN-001
    name: "pkg/vision/hash — BlockMean identity + discrimination"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Identical images → distance 0"
        action: "TestBlockMean_IdenticalImagesReturnZeroDistance"
        expected: "PASS"
      - name: "Half-black / half-white produces exactly 32 set bits (clean median split)"
        action: "TestBlockMean_HalfSplit_ProducesConsistentHash"
        expected: "PASS"
      - name: "Different images produce non-zero distance"
        action: "TestBlockMean_DifferentImagesReturnNonZeroDistance"
        expected: "PASS"
      - name: "1-pixel shift on 256-wide source → ≤ 8 bit flips"
        action: "TestBlockMean_ShiftedImagesStaySimilar"
        expected: "PASS"
      - name: "BlockMeanHasher satisfies Hasher interface"
        action: "TestBlockMean_SatisfiesHasherInterface"
        expected: "PASS"
    tags: [phase2, vision, hash, block-mean, unit]

  - id: PH2-BLOCKMEAN-002
    name: "pkg/vision/hash — ChangedTiles partial-screen detection"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Identical hashes → 0 changed tiles"
        action: "TestChangedTiles_EmptyXOR"
        expected: "PASS"
      - name: "Single-bit flip maps to correct (col, row) — top-left + bottom-right"
        action: "TestChangedTiles_SingleBitFlip + TestChangedTiles_BottomRightBit"
        expected: "Both PASS"
      - name: "All-bits flip produces full 8×8 grid coverage"
        action: "TestChangedTiles_AllBitsFlipped"
        expected: "PASS — 64 TileChange records covering every (col, row) in [0, 8)"
    tags: [phase2, vision, hash, block-mean, changed-tiles, unit]

  - id: PH2-BLOCKMEAN-003
    name: "pkg/vision/hash — BlockMean config + error paths"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "nil image → ErrNilImage; zero bounds → ErrZeroBounds"
        action: "TestBlockMean_NilImageError + TestBlockMean_ZeroBoundsError"
        expected: "Both PASS"
      - name: "BlockSize != 8 → ErrWrongBlockSize (64-bit Hasher contract)"
        action: "TestBlockMean_WrongBlockSizeError"
        expected: "PASS — rejects 4, 16, 32, -1"
      - name: "Default (0) and explicit 8 both accepted"
        action: "TestBlockMean_DefaultBlockSizeIsEight + TestBlockMean_ExplicitEightBlockSizeWorks"
        expected: "Both PASS"
      - name: "Utility helpers: medianOf (odd / even / no-mutation); blockMeans error; ErrWrongBlockSize.Error()"
        action: "TestMedianOf_OddLength + TestMedianOf_EvenLength + TestMedianOf_DoesNotMutateInput + TestBlockMeans_ZeroBoundsError + TestErrWrongBlockSize_HasErrorMessage"
        expected: "All PASS"
    tags: [phase2, vision, hash, block-mean, error-paths]

  # ─── M29 · pkg/autonomous · BOCPD + stagnation integration ───
  - id: PH2-BOCPD-001
    name: "pkg/autonomous — BOCPD Normal-Gamma conjugate prior math"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Config validation rejects invalid hazard / run-len / priors"
        action: "go test -mod=vendor -run 'TestNewBOCPD_InvalidHazard|TestNewBOCPD_InvalidMaxRunLen|TestNewBOCPD_InvalidPriors' ./pkg/autonomous/..."
        expected: "All PASS"
      - name: "Default config uses sensible Phase-2 priors"
        action: "TestNewBOCPD_DefaultConfig"
        expected: "hazard=1/250, maxRunLen=500, weakly-informative Alpha0/Beta0/Mu0/Kappa0"
      - name: "Student-t predictive PDF is symmetric, peaks at mu, non-negative"
        action: "TestStudentTPDF_SymmetricAroundMu + TestStudentTPDF_PeakAtMu + TestStudentTPDF_NonNegative"
        expected: "All PASS"
      - name: "Student-t guards invalid scale + NaN/Inf inputs"
        action: "TestStudentTPDF_InvalidScale + TestStudentTPDF_NaNInfInputsReturnZero"
        expected: "Both PASS — PDF returns 0, never NaN"
    tags: [phase2, autonomous, bocpd, math]

  - id: PH2-BOCPD-002
    name: "pkg/autonomous — BOCPD change-point detection on synthetic streams"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Stable stream converges to low P(r ≤ threshold)"
        action: "TestObserve_StableStreamConvergesToLowChangeProbability"
        expected: "PASS — after 10-step burn-in, cp stays < 0.3 for 50 stable samples"
      - name: "Step change triggers cp > 0.5 within 10 samples"
        action: "TestObserve_StepChangeTriggersChangePoint"
        expected: "PASS — mean shift 0→15 at scale 1 is detected"
      - name: "Run length resets after change point"
        action: "TestObserve_RunLengthResetsAfterChangePoint"
        expected: "PASS — MAP run length drops from 30+ to ≤ 12 after shift"
      - name: "Reset clears observation state"
        action: "TestObserve_ResetReturnsToPrior"
        expected: "PASS — runProbs length 1, zero observations after Reset"
      - name: "MaxRunLen truncation keeps per-step cost bounded"
        action: "TestObserve_MaxRunLenTruncation"
        expected: "PASS — runProbs len ≤ MaxRunLen after 50 samples"
      - name: "Underflow recovery reseeds at fresh prior"
        action: "TestObserve_UnderflowRecoversToFreshPrior"
        expected: "PASS — extreme x=1e200 triggers degenerate-recovery path, detector continues"
    tags: [phase2, autonomous, bocpd, change-point, algorithm]

  - id: PH2-STAGNATION-001
    name: "pkg/autonomous — legacy StagnationDetector byte-hash path"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "Empty / nil / short data handled safely"
        action: "TestStagnationDetector_EmptyState + TestStagnationDetector_AddScreenshot_EmptyIgnored + TestStagnationDetector_ComputeHash_EmptyAndShortData"
        expected: "All PASS"
      - name: "History bounded at maxHistory (30)"
        action: "TestStagnationDetector_AddScreenshot_BoundedHistory"
        expected: "PASS — 50 inserts produce 30-entry history"
      - name: "IsStagnant + GetStagnantDuration report correctly"
        action: "TestStagnationDetector_StagnantAfterIdenticalBurst + TestStagnationDetector_NotStagnantWhenDataChanges + TestStagnationDetector_NotStagnantBelowMinSnapshots + TestStagnationDetector_NotStagnantWhenRecentWindowTooSmall + TestStagnationDetector_StagnantDuration_AfterHashChange"
        expected: "All PASS"
      - name: "Reset clears history and state"
        action: "TestStagnationDetector_Reset"
        expected: "PASS — history len 0, GetCurrentScreen returns 'unknown'"
    tags: [phase2, autonomous, stagnation, legacy]

  - id: PH2-STAGNATION-002
    name: "pkg/autonomous — dHash + BOCPD frame path (end-to-end)"
    category: integration
    priority: critical
    platforms: [linux]
    steps:
      - name: "First AddFrame returns cp=0 (no prior)"
        action: "TestStagnationDetector_AddFrame_FirstFrameReturnsZero"
        expected: "PASS"
      - name: "Identical frame stream never triggers change point"
        action: "TestStagnationDetector_AddFrame_IdenticalFramesNoChangePoint"
        expected: "PASS — 30 identical frames → IsChangePoint=false"
      - name: "Scene change triggers cp > 0.5 within 10 frames"
        action: "TestStagnationDetector_AddFrame_SceneChangeTriggersChangePoint"
        expected: "PASS — stable burn-in followed by different image produces change signal"
      - name: "nil image returns error"
        action: "TestStagnationDetector_AddFrame_NilImageError"
        expected: "PASS — propagates hash.ErrNilImage"
      - name: "BOCPD() exposes underlying detector for diagnostics"
        action: "TestStagnationDetector_BOCPD_Exposed"
        expected: "PASS"
    tags: [phase2, autonomous, stagnation, bocpd, dhash, integration]

  # ─── M30 · pkg/regression · pixelmatch Go port ───
