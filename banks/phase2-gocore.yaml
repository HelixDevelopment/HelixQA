#
# HelixQA Test Bank: OpenClawing4 Phase 2 Go-Core
#
# This bank validates the pure-Go perception / analysis / regression packages
# that land as Phase 2 progresses. Entries appear as the corresponding
# implementations ship — empty / commented rows are placeholders tracked in
# `docs/openclawing/OpenClawing4-Phase2-Kickoff.md` §3.
#
# Every test here runs on a clean Linux container — no GPU, no OpenCV, no
# Python sidecars, no native dependencies. GPU-gated flows live in their own
# bank once the sidecars are online.

version: "1.0"
name: "OpenClawing4 Phase 2 — Go core bank"
description: >
  Tier-1 / tier-2 perception primitives + analysis + regression, pure-Go
  subset. Backs the HQA-PHASE2-GOCORE-* challenges in
  `challenges/config/helixqa-validation.yaml`.

test_cases:
  # ─── M28 · pkg/vision/hash · DHash-64 / DHash-256 ───
  - id: PH2-HASH-DHASH-001
    name: "pkg/vision/hash — DHasher basic invariants"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Build + run tests with vendor mode"
        action: "GOTOOLCHAIN=local go test -mod=vendor ./pkg/vision/hash/..."
        expected: "PASS, 100% statement coverage"
      - name: "Verify identical inputs → distance zero"
        action: "TestDHash64_IdenticalImages_DistanceZero + TestDHash256_IdenticalImages_DistanceZero"
        expected: "Both PASS"
      - name: "Verify 1-pixel shift is absorbed"
        action: "TestDHash64_ShiftedByOnePixel_DistanceSmall"
        expected: "PASS (distance ≤ 8)"
      - name: "Verify different inputs → large distance"
        action: "TestDHash64_CompletelyDifferent_DistanceLarge + TestDHash256_CompletelyDifferent_DistanceLarge"
        expected: "PASS (distance ≥ 20 for DHash-64, ≥ 80 for DHash-256)"
    tags: [phase2, vision, hash, unit]

  - id: PH2-HASH-DHASH-002
    name: "pkg/vision/hash — wrong-kind + nil-input error sentinels"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "Hash on DHash256 hasher returns ErrWrongKind64"
        action: "TestHasher_WrongKind_Hash64OnDHash256Hasher"
        expected: "PASS"
      - name: "Hash256 on DHash64 hasher returns ErrWrongKind256"
        action: "TestHasher_WrongKind_Hash256OnDHash64Hasher"
        expected: "PASS"
      - name: "nil image → ErrNilImage"
        action: "TestHasher_NilImage_Hash + TestHasher_NilImage_Hash256"
        expected: "Both PASS"
      - name: "zero-bounds image → ErrZeroBounds"
        action: "TestHasher_ZeroBounds"
        expected: "PASS"
    tags: [phase2, vision, hash, error-paths]

  - id: PH2-HASH-DHASH-003
    name: "pkg/vision/hash — image-type coverage (RGBA / NRGBA / Gray / YCbCr / generic)"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "All four concrete fast-paths exercised"
        action: "TestDHash64_HandlesVariousImageTypes + TestDHash64_YCbCr + TestDHash64_GenericImageInterface"
        expected: "All PASS"
    tags: [phase2, vision, hash, coverage]

  - id: PH2-HASH-DHASH-004
    name: "pkg/vision/hash — Hasher interface conformance"
    category: unit
    priority: medium
    platforms: [linux]
    steps:
      - name: "DHasher{Kind: DHash64} satisfies hash.Hasher"
        action: "TestDHasher_SatisfiesHasherInterface + compile-time `var _ Hasher = DHasher{...}`"
        expected: "Build + test PASS"
    tags: [phase2, vision, hash, interface]

  - id: PH2-HASH-DHASH-005
    name: "pkg/vision/hash — BigHash.Distance symmetry + 64-bit Hamming examples"
    category: unit
    priority: medium
    platforms: [linux]
    steps:
      - name: "BigHash.Distance is symmetric"
        action: "TestBigHash_Distance_Symmetric"
        expected: "PASS"
      - name: "DHasher.Distance matches hand-computed Hamming weights"
        action: "TestDistance64_Examples"
        expected: "PASS for all table entries (0, 64, 64, 7)"
    tags: [phase2, vision, hash, math]

  - id: PH2-HASH-DHASH-006
    name: "pkg/vision/hash — Article V benchmarking: < 5 ms / 1080p frame"
    category: benchmark
    priority: critical
    platforms: [linux]
    steps:
      - name: "TestPerformance_DHash64_Under5msPer1080pFrame runs 20× averages"
        action: "go test -mod=vendor -run TestPerformance_DHash64_Under5msPer1080pFrame ./pkg/vision/hash/..."
        expected: "Average per-frame latency < 5 ms (target: ~1 µs on commodity CPU)"
      - name: "BenchmarkDHash64_1080p / BenchmarkDHash256_1080p"
        action: "go test -mod=vendor -bench=. -run=^$ ./pkg/vision/hash/..."
        expected: "DHash64 < 5 µs/op, DHash256 < 20 µs/op on AMD64"
    tags: [phase2, vision, hash, benchmark, article-v-8]

  # ─── M29 · pkg/autonomous · BOCPD + stagnation integration ───
  - id: PH2-BOCPD-001
    name: "pkg/autonomous — BOCPD Normal-Gamma conjugate prior math"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Config validation rejects invalid hazard / run-len / priors"
        action: "go test -mod=vendor -run 'TestNewBOCPD_InvalidHazard|TestNewBOCPD_InvalidMaxRunLen|TestNewBOCPD_InvalidPriors' ./pkg/autonomous/..."
        expected: "All PASS"
      - name: "Default config uses sensible Phase-2 priors"
        action: "TestNewBOCPD_DefaultConfig"
        expected: "hazard=1/250, maxRunLen=500, weakly-informative Alpha0/Beta0/Mu0/Kappa0"
      - name: "Student-t predictive PDF is symmetric, peaks at mu, non-negative"
        action: "TestStudentTPDF_SymmetricAroundMu + TestStudentTPDF_PeakAtMu + TestStudentTPDF_NonNegative"
        expected: "All PASS"
      - name: "Student-t guards invalid scale + NaN/Inf inputs"
        action: "TestStudentTPDF_InvalidScale + TestStudentTPDF_NaNInfInputsReturnZero"
        expected: "Both PASS — PDF returns 0, never NaN"
    tags: [phase2, autonomous, bocpd, math]

  - id: PH2-BOCPD-002
    name: "pkg/autonomous — BOCPD change-point detection on synthetic streams"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Stable stream converges to low P(r ≤ threshold)"
        action: "TestObserve_StableStreamConvergesToLowChangeProbability"
        expected: "PASS — after 10-step burn-in, cp stays < 0.3 for 50 stable samples"
      - name: "Step change triggers cp > 0.5 within 10 samples"
        action: "TestObserve_StepChangeTriggersChangePoint"
        expected: "PASS — mean shift 0→15 at scale 1 is detected"
      - name: "Run length resets after change point"
        action: "TestObserve_RunLengthResetsAfterChangePoint"
        expected: "PASS — MAP run length drops from 30+ to ≤ 12 after shift"
      - name: "Reset clears observation state"
        action: "TestObserve_ResetReturnsToPrior"
        expected: "PASS — runProbs length 1, zero observations after Reset"
      - name: "MaxRunLen truncation keeps per-step cost bounded"
        action: "TestObserve_MaxRunLenTruncation"
        expected: "PASS — runProbs len ≤ MaxRunLen after 50 samples"
      - name: "Underflow recovery reseeds at fresh prior"
        action: "TestObserve_UnderflowRecoversToFreshPrior"
        expected: "PASS — extreme x=1e200 triggers degenerate-recovery path, detector continues"
    tags: [phase2, autonomous, bocpd, change-point, algorithm]

  - id: PH2-STAGNATION-001
    name: "pkg/autonomous — legacy StagnationDetector byte-hash path"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "Empty / nil / short data handled safely"
        action: "TestStagnationDetector_EmptyState + TestStagnationDetector_AddScreenshot_EmptyIgnored + TestStagnationDetector_ComputeHash_EmptyAndShortData"
        expected: "All PASS"
      - name: "History bounded at maxHistory (30)"
        action: "TestStagnationDetector_AddScreenshot_BoundedHistory"
        expected: "PASS — 50 inserts produce 30-entry history"
      - name: "IsStagnant + GetStagnantDuration report correctly"
        action: "TestStagnationDetector_StagnantAfterIdenticalBurst + TestStagnationDetector_NotStagnantWhenDataChanges + TestStagnationDetector_NotStagnantBelowMinSnapshots + TestStagnationDetector_NotStagnantWhenRecentWindowTooSmall + TestStagnationDetector_StagnantDuration_AfterHashChange"
        expected: "All PASS"
      - name: "Reset clears history and state"
        action: "TestStagnationDetector_Reset"
        expected: "PASS — history len 0, GetCurrentScreen returns 'unknown'"
    tags: [phase2, autonomous, stagnation, legacy]

  - id: PH2-STAGNATION-002
    name: "pkg/autonomous — dHash + BOCPD frame path (end-to-end)"
    category: integration
    priority: critical
    platforms: [linux]
    steps:
      - name: "First AddFrame returns cp=0 (no prior)"
        action: "TestStagnationDetector_AddFrame_FirstFrameReturnsZero"
        expected: "PASS"
      - name: "Identical frame stream never triggers change point"
        action: "TestStagnationDetector_AddFrame_IdenticalFramesNoChangePoint"
        expected: "PASS — 30 identical frames → IsChangePoint=false"
      - name: "Scene change triggers cp > 0.5 within 10 frames"
        action: "TestStagnationDetector_AddFrame_SceneChangeTriggersChangePoint"
        expected: "PASS — stable burn-in followed by different image produces change signal"
      - name: "nil image returns error"
        action: "TestStagnationDetector_AddFrame_NilImageError"
        expected: "PASS — propagates hash.ErrNilImage"
      - name: "BOCPD() exposes underlying detector for diagnostics"
        action: "TestStagnationDetector_BOCPD_Exposed"
        expected: "PASS"
    tags: [phase2, autonomous, stagnation, bocpd, dhash, integration]

  # ─── M30 · pkg/regression · pixelmatch Go port ───
  - id: PH2-PIXELMATCH-001
    name: "pkg/regression — PixelMatch.Diff basic invariants"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Identical images produce zero DiffCount"
        action: "TestDiff_IdenticalImagesYieldZeroDiff"
        expected: "PASS"
      - name: "Completely different images flag every pixel"
        action: "TestDiff_CompletelyDifferentImagesFlagEveryPixel"
        expected: "PASS — 256 pixels flagged on a 16×16 all-black vs all-white diff"
      - name: "Partial differences are correctly scoped"
        action: "TestDiff_PartialDifference"
        expected: "PASS — 4×4 patch produces 4-16 flagged pixels"
      - name: "Higher threshold ignores small differences"
        action: "TestDiff_HigherThresholdIgnoresSmallDifferences"
        expected: "PASS — strict threshold flags more pixels than loose"
      - name: "Custom DiffColor renders in output"
        action: "TestDiff_CustomDiffColorRenderedInOutput"
        expected: "PASS — output pixels match the requested color"
    tags: [phase2, regression, pixelmatch, unit]

  - id: PH2-PIXELMATCH-002
    name: "pkg/regression — PixelMatch.Diff error + edge cases"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "nil images return ErrNilImage"
        action: "TestDiff_NilImageErrors"
        expected: "PASS — both a=nil and b=nil produce the sentinel"
      - name: "dimension mismatch returns ErrDimensionMismatch"
        action: "TestDiff_DimensionMismatchErrors"
        expected: "PASS"
      - name: "zero-sized images return empty report"
        action: "TestDiff_ZeroSizedImagesReturnEmptyReport"
        expected: "PASS — empty Output, zero counts"
      - name: "IncludeAA flag rolls AA pixels into DiffCount"
        action: "TestDiff_IncludeAAFlagCountsAAPixelsAsDifferences"
        expected: "PASS"
    tags: [phase2, regression, pixelmatch, error-paths]

  - id: PH2-PIXELMATCH-003
    name: "pkg/regression — YIQ + anti-aliasing math"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "colorDelta Y-only mode captures luma"
        action: "TestColorDelta_YOnlyMode"
        expected: "PASS"
      - name: "rgb2y/i/q are zero at black"
        action: "TestRGB2YIQ_BlackIsZero"
        expected: "PASS"
      - name: "blendWhite preserves opaque color, returns white at zero alpha"
        action: "TestBlendWhite_FullOpaquePreservesColor + TestBlendWhite_ZeroAlphaProducesWhite"
        expected: "Both PASS"
      - name: "hasManySiblings correctly classifies uniform vs noisy patches"
        action: "TestHasManySiblings_UniformPatchIsSibling + TestHasManySiblings_NoiseIsSolitary"
        expected: "Both PASS"
      - name: "Differ interface conformance"
        action: "TestPixelMatch_SatisfiesDifferInterface"
        expected: "PASS"
    tags: [phase2, regression, pixelmatch, yiq, aa]

  # ─── M31 · pkg/nexus/observe/axtree · AT-SPI2 Linux client ───
  - id: PH2-AXTREE-LINUX-001
    name: "pkg/nexus/observe/axtree — LinuxSnapshotter happy path"
    category: unit
    priority: critical
    platforms: [linux]
    steps:
      - name: "Snapshot returns full tree with correct hierarchy"
        action: "TestLinuxSnapshotter_Snapshot_FullTree"
        expected: "PASS — root.CountDescendants()==5, Platform==PlatformLinux"
      - name: "All Node properties propagate (Role, Name, Value, Bounds, Enabled, Focused, Selected)"
        action: "TestLinuxSnapshotter_Snapshot_PropertiesPropagate"
        expected: "PASS — button bounds, textbox value, dialog disabled/selected all correct"
      - name: "Snapshotter interface conformance"
        action: "TestLinuxSnapshotter_SatisfiesSnapshotterInterface"
        expected: "PASS"
    tags: [phase2, axtree, atspi2, linux, unit]

  - id: PH2-AXTREE-LINUX-002
    name: "pkg/nexus/observe/axtree — error + lifecycle paths"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "Close is idempotent — bus.Close only fires once"
        action: "TestLinuxSnapshotter_Close_Idempotent"
        expected: "PASS"
      - name: "Snapshot after Close returns ErrSnapshotClosed"
        action: "TestLinuxSnapshotter_Snapshot_AfterCloseReturnsError"
        expected: "PASS"
      - name: "GetRoot / GetProps / GetChildren errors propagate with wrapped context"
        action: "TestLinuxSnapshotter_Snapshot_GetRootError + TestLinuxSnapshotter_Snapshot_GetPropsError + TestLinuxSnapshotter_Snapshot_GetChildrenError"
        expected: "All PASS — error message contains method name"
      - name: "Empty root path returns ErrNoRoot"
        action: "TestLinuxSnapshotter_Snapshot_EmptyRoot"
        expected: "PASS"
      - name: "Canceled context bails out of walk"
        action: "TestLinuxSnapshotter_Snapshot_ContextCanceled"
        expected: "PASS"
    tags: [phase2, axtree, atspi2, linux, error-paths]

  - id: PH2-AXTREE-LINUX-003
    name: "pkg/nexus/observe/axtree — Node.Walk / Find / CountDescendants"
    category: unit
    priority: high
    platforms: [linux]
    steps:
      - name: "Walk visits every node depth-first pre-order"
        action: "TestNode_Walk_VisitsEveryNodeDepthFirstPreOrder"
        expected: "PASS — visited order matches expected traversal"
      - name: "Walk propagates visitor errors + handles nil receiver"
        action: "TestNode_Walk_PropagatesError + TestNode_Walk_NilNodeIsNoop"
        expected: "Both PASS"
      - name: "Find returns nil on no match + stops at first match"
        action: "TestNode_Find_ReturnsNilOnNoMatch + TestNode_Find_StopsAtFirstMatch"
        expected: "Both PASS"
      - name: "CountDescendants handles nil"
        action: "TestNode_CountDescendants_Nil"
        expected: "PASS"
    tags: [phase2, axtree, node, tree-ops]

  - id: PH2-AXTREE-LINUX-004
    name: "pkg/nexus/observe/axtree — AT-SPI role → ARIA translation"
    category: unit
    priority: medium
    platforms: [linux]
    steps:
      - name: "Every mapped AT-SPI role code translates to the expected ARIA name"
        action: "TestAtspiRoleToARIA_KnownRoles"
        expected: "PASS — 31 roles covered (application, button, textbox, slider, ...)"
      - name: "Unknown role code produces 'role-<N>' fallback"
        action: "TestAtspiRoleToARIA_UnknownCodeFallback"
        expected: "PASS"
      - name: "roleCodeFromName round-trips + is case-insensitive"
        action: "TestRoleCodeFromName_RoundTrip + TestRoleCodeFromName_CaseInsensitive + TestRoleCodeFromName_Unknown"
        expected: "All PASS"
      - name: "stateBit decodes two-uint32 bitmask"
        action: "TestStateBit_ReadsCorrectBit"
        expected: "PASS — bit 12 in word 0, bit 40 in word 1, out-of-range → false"
    tags: [phase2, axtree, atspi2, role-mapping]

  # Production D-Bus integration (blocked on a real AT-SPI2 session —
  # no GNOME/KDE in CI; runs on the operator's desktop only)
  - id: PH2-AXTREE-LINUX-INT-001
    name: "pkg/nexus/observe/axtree — ConnectLinuxBus live smoke test"
    category: integration
    priority: high
    platforms: [linux]
    requires: [dbus-a11y-bus-running]
    steps:
      - name: "ConnectLinuxBus succeeds when the a11y bus is up"
        action: "go test -mod=vendor -count=1 -tags=integration -run 'TestConnectLinuxBus_Live' ./pkg/nexus/observe/axtree/..."
        expected: "PASS on an operator desktop with AT-SPI2 running — skipped in CI"
      - name: "Snapshot of live tree returns ≥ 1 child"
        action: "Run the above with HELIXQA_AXTREE_SMOKE=1 set"
        expected: "Tree has ≥ 1 descendant reflecting the currently-focused app"
    tags: [phase2, axtree, atspi2, linux, integration, manual]

