  - id: FIX-OC4-004
    name: "pkg/nexus/observe/axtree — Snapshotter/LinuxBus interface boundary"
    category: regression
    priority: critical
    platforms: [linux, all]
    steps:
      - name: "LinuxSnapshotter satisfies Snapshotter at compile time"
        action: "go build -mod=vendor ./pkg/nexus/observe/axtree/..."
        expected: "exit 0 — `var _ Snapshotter = (*LinuxSnapshotter)(nil)` stays green"
      - name: "linuxBusGodbus satisfies LinuxBus at compile time"
        action: "go build -mod=vendor ./pkg/nexus/observe/axtree/..."
        expected: "exit 0 — `var _ LinuxBus = (*linuxBusGodbus)(nil)` stays green"
      - name: "Tests pass end-to-end against the fake LinuxBus"
        action: "go test -mod=vendor -count=1 ./pkg/nexus/observe/axtree/..."
        expected: "PASS — 22 unit tests cover all testable Snapshotter + Node paths"
    tags: [regression, phase2, openclawing4, axtree, interface, atspi2]
    estimated_duration: "1s"
    expected_result: "The LinuxBus narrow-interface abstraction keeps Snapshot tests CGO-free and dbus-free while still being wire-correct for the production godbus path"
    fix_reference:
      bug_id: "FIX-OC4-004"
      description: "Establishes the LinuxBus narrow-interface contract between LinuxSnapshotter and whatever backend it runs on. Production uses linuxBusGodbus (session bus → org.a11y.Bus.GetAddress → a11y bus → AT-SPI2 methods); tests inject a fake that returns scripted trees. The boundary is essential because a real a11y bus requires a GNOME/KDE session that CI does not have, and writing a full D-Bus mock would double the code for no gain."
      fix_file: "HelixQA/pkg/nexus/observe/axtree/linux.go"
      fix_commit: "pending"

  - id: FIX-OC4-005
    name: "pkg/nexus/observe/axtree/android — UIAutomator bounds-regex parse guard"
    category: regression
    priority: high
    platforms: [android, all]
    steps:
      - name: "Bounds regex accepts happy / negative / rejects malformed"
        action: "go test -mod=vendor -count=1 -run 'TestParseAndroidBounds' ./pkg/nexus/observe/axtree/..."
        expected: "PASS — happy path, negative coordinates, 4 malformed inputs"
      - name: "boolAttr stays strict (only 'true' is true)"
        action: "go test -mod=vendor -count=1 -run 'TestBoolAttr' ./pkg/nexus/observe/axtree/..."
        expected: "PASS — 'true' → true, everything else → false"
    tags: [regression, phase2, openclawing4, axtree, android, xml-parsing]
    estimated_duration: "1s"
    expected_result: "Android dump parsing stays correct against the observed UIAutomator output format"
    fix_reference:
      bug_id: "FIX-OC4-005"
      description: "The UIAutomator dump format uses '[x1,y1][x2,y2]' for bounds and literal 'true'/'false' strings for boolean attributes. parseAndroidBounds uses a compiled regexp with explicit bracket structure so device-vendor variants that emit extra whitespace, different separators, or rotated coord orders either work (via the existing regex) or deterministically fall back to the zero rect. boolAttr is deliberately strict — a vendor emitting 'TRUE' would be a bug to flag, not silently accept."
      fix_file: "HelixQA/pkg/nexus/observe/axtree/android.go"
      fix_commit: "pending"
