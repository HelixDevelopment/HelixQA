# HelixQA Test Bank: Fixes Validation Suite
# Regression tests for all bug fixes discovered during QA campaigns.
# Every fix MUST have a corresponding test entry here to prevent regression.
# This bank is permanent and grows with each QA iteration.

version: "1.0"
name: "Catalogizer Fixes Validation Suite"
description: "Regression tests ensuring all discovered and fixed bugs never recur. Each entry maps to a specific bug fix with evidence."
metadata:
  author: "vasic-digital"
  app: "Catalogizer"
  version: "2.3.0"

test_cases:
  # ==================== v2.3.0 Build 18 Fixes ====================

  - id: FIX-001
    name: "Provider routing challenge whitespace tolerance"
    category: regression
    priority: high
    platforms: [api]
    steps:
      - name: "Run provider-manager-routing challenge"
        action: "Execute CH-097 provider-manager-routing challenge via API"
        expected: "Challenge passes — detects providers map field despite Go struct alignment whitespace"
      - name: "Verify all assertions pass"
        action: "Check all 9 assertions in challenge result"
        expected: "All assertions passed=true, including provider_map assertion"
    tags: [regression, challenge, provider, whitespace]
    estimated_duration: "5s"
    expected_result: "Challenge passes with regex-based whitespace-tolerant matching"
    fix_reference:
      bug_id: "QA-2026-04-04-001"
      description: "provider-manager-routing challenge failed because string match did not tolerate Go struct field alignment whitespace"
      fix_file: "catalog-api/challenges/ch094_098_provider_verification.go"
      fix_commit: "pending"

  - id: FIX-002
    name: "EntityDetail jsdom/undici unhandled rejection"
    category: regression
    priority: medium
    platforms: [web]
    steps:
      - name: "Run EntityDetail test suite"
        action: "npm run test -- --reporter=verbose src/pages/__tests__/EntityDetail.test.tsx"
        expected: "All tests pass with zero unhandled rejections"
      - name: "Check for InvalidArgumentError"
        action: "Verify no 'UND_ERR_INVALID_ARG' errors in test output"
        expected: "Zero InvalidArgumentError occurrences"
    tags: [regression, frontend, jsdom, undici, entitydetail]
    estimated_duration: "30s"
    expected_result: "EntityDetail tests pass without jsdom/undici compatibility errors"
    fix_reference:
      bug_id: "QA-2026-04-04-002"
      description: "EntityDetail.test.tsx produces 174 InvalidArgumentError unhandled rejections from jsdom dispatcher"
      fix_file: "catalog-web/src/pages/__tests__/EntityDetail.test.tsx"
      fix_commit: "pending"

  - id: FIX-003
    name: "Playback history UI on all four apps"
    category: regression
    priority: high
    platforms: [androidtv, android, web, desktop]
    steps:
      - name: "Android TV: verify ProgressBadge on home card"
        action: "Launch com.catalogizer.androidtv, navigate to first movie rail card with progress data"
        expected: "ProgressBadge visible at BottomStart of cover art showing duration, current, last session, play count"
      - name: "Android TV: open HistoryDialog from detail screen"
        action: "DPAD_CENTER on focused card, navigate to History button in detail, DPAD_CENTER"
        expected: "Reproduction History dialog opens with 5-row summary + session list"
      - name: "Android phone: verify ProgressBadge on MediaCard"
        action: "Launch com.catalogizer.android home screen"
        expected: "ProgressBadge overlay rendered on cards with playback data"
      - name: "Android phone: long-press card opens history"
        action: "Long-press any media card on home screen"
        expected: "HistoryDialog (Material 3 AlertDialog) opens with summary + sessions"
      - name: "Web: verify ProgressBadge overlay"
        action: "Open catalog-web, navigate to any grid page using MediaGrid"
        expected: "ProgressBadge visible at bottom of each cover, data-testid=progress-badge-{id}"
      - name: "Web: click badge opens HistoryDrawer"
        action: "Click ProgressBadge on any card"
        expected: "HistoryDrawer modal opens, shows summary rows + sessions, ESC closes"
      - name: "Desktop: verify ProgressBadge on HomePage"
        action: "Launch catalogizer-desktop, open Home route"
        expected: "ProgressBadge visible on cards in Continue Watching / Recent / Highly Rated sections"
      - name: "Desktop: click badge opens HistoryDrawer"
        action: "Click ProgressBadge on any card"
        expected: "HistoryDrawer modal opens with summary + sessions, click outside closes"
    tags: [regression, playback, badge, history, cross-platform]
    estimated_duration: "4m"
    expected_result: "ProgressBadge renders on all four apps with matching strings; HistoryDialog/HistoryDrawer opens and shows real session data"
    fix_reference:
      bug_id: "N4-playback-history-ui"
      description: "Playback history tracked by backend + TV PlaybackTracker but no user-visible UI existed on any app"
      fix_files:
        - "catalogizer-androidtv/app/src/main/java/com/catalogizer/androidtv/ui/components/ProgressBadge.kt"
        - "catalogizer-androidtv/app/src/main/java/com/catalogizer/androidtv/ui/components/HistoryDialog.kt"
        - "catalogizer-android/app/src/main/java/com/catalogizer/android/ui/components/ProgressBadge.kt"
        - "catalog-web/src/components/media/ProgressBadge.tsx"
        - "catalog-web/src/components/media/HistoryDrawer.tsx"
        - "catalogizer-desktop/src/components/ProgressBadge.tsx"
        - "catalogizer-desktop/src/components/HistoryDrawer.tsx"
      fix_commits:
        - "7a9d6cac"
        - "0f447e22"
        - "8595b013"
        - "2a73e02e"
        - "9f411a4b"
        - "71a68e6d"
        - "22380e77"

  - id: FIX-004
    name: "Android TV search IME input accumulation"
    category: regression
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Open search screen"
        action: "Launch com.catalogizer.androidtv, navigate to Search"
        expected: "Search field focused"
      - name: "Type first query via DPAD_CENTER then text"
        action: "DPAD_CENTER to open IME, then `input text matrix`"
        expected: "Field shows 'matrix' exactly, no leading garbage"
      - name: "Clear and type second query"
        action: "Clear field, type `die hard`"
        expected: "Field shows 'die hard' exactly, no accumulated text from first query"
      - name: "Submit second query"
        action: "DPAD_CENTER again to submit"
        expected: "Results grid loads matching 'die hard'"
    tags: [regression, androidtv, search, ime]
    estimated_duration: "30s"
    expected_result: "Each query replaces the previous one cleanly; DPAD_CENTER open/submit flow works"
    fix_reference:
      bug_id: "TICKET-001-androidtv-search-text-accumulation"
      description: "Text from prior search accumulated because DPAD_CENTER did not open IME before input text"
      fix_file: "catalogizer-androidtv/app/src/main/java/com/catalogizer/androidtv/ui/screens/search/SearchScreen.kt"
      fix_commit: "91637738"

  - id: FIX-005
    name: "Android TV auth token persisted across relaunch"
    category: regression
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Log in fresh"
        action: "Launch app, log in with admin/admin123 via form"
        expected: "Home screen loads with library items"
      - name: "Force-stop app"
        action: "adb shell am force-stop com.catalogizer.androidtv"
        expected: "Process killed"
      - name: "Cold-start without intent extras"
        action: "adb shell am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "App lands directly on home screen without showing login"
      - name: "Verify library content"
        action: "Screenshot home"
        expected: "174+ items visible, no 'Sign In' text in UI dump"
    tags: [regression, androidtv, auth, token-persistence]
    estimated_duration: "45s"
    expected_result: "JWT is persisted via TokenStore / EncryptedSharedPreferences and rehydrated on cold start"
    fix_reference:
      bug_id: "N1-auth-token-persistence"
      description: "JWT was not written to EncryptedSharedPreferences so relaunch lost authenticated state"
      fix_files:
        - "catalogizer-androidtv/app/src/main/java/com/catalogizer/androidtv/data/auth/TokenStore.kt"
        - "catalogizer-androidtv/app/src/main/java/com/catalogizer/androidtv/data/repository/AuthRepository.kt"
      fix_commits:
        - "7d206ae9"
        - "acb66c76"
        - "07d1c8c4"

  - id: FIX-006
    name: "Web Dashboard: Something went wrong after login"
    category: regression
    priority: high
    platforms: [web]
    steps:
      - name: "Run DashboardStats partial-payload tests"
        action: "cd catalog-web && npx vitest run src/components/dashboard/__tests__/DashboardStats.test.tsx"
        expected: "15 tests pass — including 3 partial-payload regressions"
      - name: "Playwright: log in and land on Dashboard"
        action: "Start catalog-api + catalog-web, open http://localhost:3000, log in as admin/admin123"
        expected: "Dashboard renders stats cards without error boundary firing, no 'Something went wrong' message"
      - name: "Verify even with empty backend payload"
        action: "Stub /api/v1/media/stats to return empty {} and reload /"
        expected: "Dashboard still renders, cards show 0 fallbacks, no thrown exceptions"
    tags: [regression, web, dashboard, error-boundary]
    estimated_duration: "2m"
    expected_result: "Dashboard never throws when MediaStats / UserStats fields are partial or missing"
    fix_reference:
      bug_id: "TICKET-008-web-dashboard-error-after-login"
      description: "DashboardStats used `mediaStats?.total_items.toLocaleString()` — the optional chain only guards the outer object, not the property. Any missing numeric field (total_items, total_size, active_users, total_users, sessions_today) threw TypeError and tripped the error boundary."
      fix_file: "catalog-web/src/components/dashboard/DashboardStats.tsx"
      fix_commit: "pending"

  - id: FIX-007
    name: "Android TV: no black frame between login and home"
    category: regression
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Launch app + log in"
        action: "Launch com.catalogizer.androidtv cleanly, log in with admin/admin123"
        expected: "Login success → immediate transition to home"
      - name: "Capture first post-login screenshot at <500ms"
        action: "screencap 200ms after login submit"
        expected: "Frame shows either the loading spinner+text OR populated home, NEVER fully black"
      - name: "Capture five consecutive post-login frames"
        action: "screencap every 300ms for 1.5s"
        expected: "Every frame has non-black pixels covering >15% of the screen"
    tags: [regression, androidtv, transition, black-frame]
    estimated_duration: "10s"
    expected_result: "Home screen's HomeUiState starts in isLoading=true so first compose renders the spinner — never empty content"
    fix_reference:
      bug_id: "TICKET-002-androidtv-black-screen-transition"
      description: "HomeUiState() defaulted isLoading=false, so the first frame between initial composition and LaunchedEffect(loadHomeData) rendered no spinner AND no data — captured as a black screen."
      fix_file: "catalogizer-androidtv/app/src/main/java/com/catalogizer/androidtv/ui/viewmodel/HomeViewModel.kt"
      fix_commit: "pending"

  - id: FIX-008
    name: "Android TV: settings screen never shows home overlay behind it"
    category: regression
    priority: medium
    platforms: [androidtv]
    steps:
      - name: "Start home data load"
        action: "Launch app, log in, navigate to Settings while home is still loading"
        expected: "Settings screen appears"
      - name: "Capture screenshot mid-transition"
        action: "screencap while the home loader may still be animating"
        expected: "Screenshot shows only the settings UI — no 'Loading your media collection…' text or home spinner bleeding through"
    tags: [regression, androidtv, settings, opacity]
    estimated_duration: "8s"
    expected_result: "Settings root Box has explicit opaque black background so sibling routes cannot bleed through during navigation"
    fix_reference:
      bug_id: "TICKET-003-androidtv-settings-loading-overlay"
      description: "SettingsScreen root Box lacked a background modifier so transitions from the Home loading state could be captured through the settings composition."
      fix_file: "catalogizer-androidtv/app/src/main/java/com/catalogizer/androidtv/ui/screens/settings/SettingsScreen.kt"
      fix_commit: "pending"

  - id: FIX-009
    name: "Android TV: entity title uses ellipsis instead of abrupt truncation"
    category: regression
    priority: low
    platforms: [androidtv]
    steps:
      - name: "Open detail for a long-titled media item"
        action: "Search 'Lucky Luke', open any result"
        expected: "Detail screen loads"
      - name: "Inspect title Text"
        action: "Dump UI hierarchy, find title Text element"
        expected: "Text has maxLines=2 and overflow=Ellipsis — long titles show '…' not an abrupt cut"
    tags: [regression, androidtv, detail, typography]
    estimated_duration: "15s"
    expected_result: "MediaDetailScreen title composable has maxLines=2, overflow=TextOverflow.Ellipsis"
    fix_reference:
      bug_id: "TICKET-004-androidtv-title-truncation"
      description: "Originally raised when a long title appeared cut off. Already fixed in source — this regression test locks it in place."
      fix_file: "catalogizer-androidtv/app/src/main/java/com/catalogizer/androidtv/ui/screens/media/MediaDetailScreen.kt"
      fix_commit: "already-fixed-in-source"

  - id: FIX-010
    name: "Auth login rate limiter actually rejects floods"
    category: security
    priority: critical
    platforms: [api]
    steps:
      - name: "Flood /auth/login with 300 requests"
        action: "k6 run tests/k6/ddos_ratelimit_test.js"
        expected: "rate_limit_rejections rate > 0.90 — at least 90% of flood requests return 429"
      - name: "Recovery health check"
        action: "After flood stops, GET /health every 1s for 30s"
        expected: "Every response returns 200 healthy, p95 latency < 500ms — limiter doesn't permanently brick the server"
      - name: "Brute force locked after 6 attempts"
        action: "Single VU hammers /auth/login with wrong creds"
        expected: "Attempts 7..20 all return 401 or 429, never 5xx"
    tags: [security, ddos, rate-limit, brute-force, login]
    estimated_duration: "90s"
    expected_result: "loginRateLimiter (30/min per IP) on /login + /register actively rejects hostile bursts while letting legitimate traffic recover"
    fix_reference:
      bug_id: "phase-d-ddos-hardening"
      description: "Previously /login and /register used the shared authRateLimiter at 600/min per IP — 10 rps per IP is too lax for brute-force protection. Tiered limits now split login (30/min), token ops (600/min), and default (2000/min) so the challenge runner still works but attackers are rejected."
      fix_files:
        - "catalog-api/main.go"
        - "tests/k6/ddos_ratelimit_test.js"
      fix_commit: "pending"

  # Placeholder for fixes discovered during this QA campaign
  # New entries will be added as bugs are found and fixed
