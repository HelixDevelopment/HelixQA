  - id: FIX-OC4-001
    name: "pkg/vision/hash — dHash perf regression guard (<5ms / 1080p CPU)"
    category: regression
    priority: critical
    platforms: [linux, all]
    steps:
      - name: "DHash64 stays under the 5 ms / 1080p Article V §8 budget"
        action: "go test -mod=vendor -count=1 -run 'TestPerformance_DHash64_Under5msPer1080pFrame' ./pkg/vision/hash/..."
        expected: "PASS (target: ~1 µs on commodity CPU via fast-path resize)"
      - name: "Fast-paths remain covered for all common concrete image types"
        action: "go test -mod=vendor -count=1 -cover -run 'TestDHash64_HandlesVariousImageTypes|TestDHash64_YCbCr|TestDHash64_GenericImageInterface' ./pkg/vision/hash/..."
        expected: "PASS with 100% statement coverage"
    tags: [regression, phase2, openclawing4, vision, hash, performance]
    estimated_duration: "1s"
    expected_result: "Perf regression guard stays green on every commit"
    fix_reference:
      bug_id: "FIX-OC4-001"
      description: "First implementation of resizeGray used box-average over all source pixels, producing ~58 ms per 1080p frame — 11× over the <5 ms Phase-2 tier-1 budget. Replaced with nearest-neighbor sampling at region centers + fast-paths for image.RGBA / image.NRGBA / image.Gray / image.YCbCr (direct Pix-byte access, no interface dispatch, no 16-bit channel expansion). Final per-frame cost on commodity CPU: ~1 µs (DHash64) / ~3 µs (DHash256)."
      fix_file: "HelixQA/pkg/vision/hash/dhash.go"
      fix_commit: "pending"

  - id: FIX-OC4-002
    name: "pkg/autonomous/bocpd — P(r=0) always equals hazard regression guard"
    category: regression
    priority: critical
    platforms: [linux, all]
    steps:
      - name: "Stable-stream test guards against reverting to the naive P(r=0) return"
        action: "go test -mod=vendor -count=1 -run 'TestObserve_StableStreamConvergesToLowChangeProbability' ./pkg/autonomous/..."
        expected: "PASS — post-burn-in cp stays < 0.3 for 50 identical samples (would fail if Observe returned hazard instead of P(r ≤ threshold))"
      - name: "Step-change test guards against losing the change signal"
        action: "go test -mod=vendor -count=1 -run 'TestObserve_StepChangeTriggersChangePoint' ./pkg/autonomous/..."
        expected: "PASS — mean shift produces cp > 0.5 within 10 samples"
    tags: [regression, phase2, openclawing4, autonomous, bocpd, change-point]
    estimated_duration: "1s"
    expected_result: "BOCPD keeps returning a meaningful change signal — not the constant hazard"
    fix_reference:
      bug_id: "FIX-OC4-002"
      description: "Initial BOCPD implementation returned next[0] (the r=0 posterior mass) as the change probability. Under constant-hazard BOCPD this is algebraically identical to the hazard rate regardless of observation — useless as a change signal. Fixed by returning P(r_t ≤ ChangeThreshold | x_{1:t}), the posterior mass that has collapsed to short run lengths. This is the quantity that actually spikes when the stream shifts; see Gundersen 2019 and Turner's reference implementation."
      fix_file: "HelixQA/pkg/autonomous/bocpd.go"
      fix_commit: "pending"

