  - id: FIX-010
    name: "Auth login rate limiter actually rejects floods"
    category: security
    priority: critical
    platforms: [api]
    steps:
      - name: "Flood /auth/login with 300 requests"
        action: "k6 run tests/k6/ddos_ratelimit_test.js"
        expected: "rate_limit_rejections rate > 0.90 — at least 90% of flood requests return 429"
      - name: "Recovery health check"
        action: "After flood stops, GET /health every 1s for 30s"
        expected: "Every response returns 200 healthy, p95 latency < 500ms — limiter doesn't permanently brick the server"
      - name: "Brute force locked after 6 attempts"
        action: "Single VU hammers /auth/login with wrong creds"
        expected: "Attempts 7..20 all return 401 or 429, never 5xx"
    tags: [security, ddos, rate-limit, brute-force, login]
    estimated_duration: "90s"
    expected_result: "loginRateLimiter (30/min per IP) on /login + /register actively rejects hostile bursts while letting legitimate traffic recover"
    fix_reference:
      bug_id: "phase-d-ddos-hardening"
      description: "Previously /login and /register used the shared authRateLimiter at 600/min per IP — 10 rps per IP is too lax for brute-force protection. Tiered limits now split login (30/min), token ops (600/min), and default (2000/min) so the challenge runner still works but attackers are rejected."
      fix_files:
        - "catalog-api/main.go"
        - "tests/k6/ddos_ratelimit_test.js"
      fix_commit: "pending"

  - id: FIX-011
    name: "Android TV: libVLC deferred surface attachment"
    category: regression
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Open a movie from detail screen"
        action: "Navigate to any movie detail, press Play Now"
        expected: "VLCPlayerActivity launches"
      - name: "Verify video surface receives frames"
        action: "Wait 5s, capture screenshot"
        expected: "Screenshot shows video content (not black or 'Media opening' text)"
      - name: "Verify HTTP GET for stream was issued"
        action: "Check logcat for '206 Partial Content' or 'Playing:' log from VLCPlayer"
        expected: "Log entry shows the stream URL was fetched after surface attachment"
    tags: [regression, androidtv, vlc, surface, playback]
    estimated_duration: "30s"
    expected_result: "VLCPlayer.play() defers to attachView() when called before Compose AndroidView factory runs; pending URI replayed after surface is ready"
    fix_reference:
      bug_id: "N2-libvlc-surface-attachment"
      description: "VLCPlayerActivity called vlcPlayer.play() in onCreate synchronously, but the Compose AndroidView factory (which calls attachView) runs on the next frame. Without a surface, libVLC entered 'Media opening' but never issued the HTTP GET for the stream."
      fix_file: "catalogizer-androidtv/app/src/main/java/com/catalogizer/androidtv/player/VLCPlayer.kt"
      fix_commit: "pending"

  # ==================== Phase 1-3 Concurrency & Lifecycle Fixes ====================

  - id: FIX-012
    name: "WorkerPool SubmitAsync goroutine tracking"
    category: regression
    priority: critical
    platforms: [api]
    steps:
      - name: "Submit 100 async tasks via WorkerPool"
        action: "Create WorkerPool with 10 workers, call SubmitAsync() 100 times with short tasks"
        expected: "All 100 tasks accepted and queued"
      - name: "Wait for all tasks to complete"
        action: "Call WaitGroup-based completion or drain pool"
        expected: "All 100 tasks complete without goroutine leak"
      - name: "Check goroutine count"
        action: "runtime.NumGoroutine() before and after pool shutdown"
        expected: "Goroutine count returns to baseline (within 5 of pre-pool count)"
      - name: "Verify no panic on double-submit after shutdown"
        action: "Call SubmitAsync() after pool Stop()"
        expected: "Returns error or silently drops task, no panic"
    tags: [regression, concurrency, workerpool, goroutine-tracking, async]
    estimated_duration: "10s"
    expected_result: "SubmitAsync tracks all goroutines via WaitGroup; pool shutdown waits for completion"
    fix_reference:
      bug_id: "phase1-workerpool-goroutine-tracking"
      description: "WorkerPool.SubmitAsync() launched goroutines without WaitGroup tracking, causing goroutine leaks on pool shutdown"
      fix_file: "Concurrency/pool.go"

  - id: FIX-013
    name: "Throttler Stop() waits for goroutine"
    category: regression
    priority: high
    platforms: [api]
    steps:
      - name: "Create Throttler and submit tasks"
        action: "Create Throttler with rate limit, submit 20 throttled operations"
        expected: "Operations execute at throttled rate"
      - name: "Call Stop() during active throttling"
        action: "Call Throttler.Stop() while tasks are still queued"
        expected: "Stop() blocks until internal goroutine exits cleanly"
      - name: "Verify goroutine exited"
        action: "runtime.NumGoroutine() after Stop() returns"
        expected: "No lingering throttler goroutine"
      - name: "Verify double Stop() is safe"
        action: "Call Stop() again"
        expected: "No panic, no-op via sync.Once"
    tags: [regression, concurrency, throttler, goroutine, stop, sync-once]
    estimated_duration: "5s"
    expected_result: "Throttler.Stop() waits for internal goroutine to exit before returning"
    fix_reference:
      bug_id: "phase1-throttler-stop-goroutine"
      description: "Throttler.Stop() did not wait for the internal rate-limiting goroutine to exit, causing goroutine leak in tests"
      fix_file: "Concurrency/throttler.go"

  - id: FIX-014
    name: "Debouncer Flush() no deadlock on reentrant call"
    category: regression
    priority: critical
    platforms: [api]
    steps:
      - name: "Create Debouncer with callback that calls Flush()"
        action: "Create Debouncer where the debounced function itself calls Flush() on a sibling debouncer"
        expected: "Debouncer created without error"
      - name: "Trigger debounce and wait"
        action: "Call debouncer.Trigger() then debouncer.Flush()"
        expected: "Flush() completes within 5 seconds (no deadlock)"
      - name: "Verify callback executed exactly once"
        action: "Check callback execution counter"
        expected: "Counter equals 1 (debounce coalesced, flush triggered execution)"
      - name: "Verify subsequent triggers work"
        action: "Trigger debouncer again after flush"
        expected: "New debounce cycle starts normally"
    tags: [regression, concurrency, debouncer, flush, deadlock, reentrant]
    estimated_duration: "10s"
    expected_result: "Flush() never deadlocks even when called from related callback contexts"
    fix_reference:
      bug_id: "phase1-debouncer-flush-deadlock"
      description: "Debouncer.Flush() acquired the same mutex as the timer callback, causing deadlock when Flush() was called in contexts triggered by related debouncers"
      fix_file: "Concurrency/debouncer.go"

  - id: FIX-015
    name: "WebSocket handler no over-admission under concurrent connections"
    category: regression
    priority: critical
    platforms: [api]
    steps:
      - name: "Set max WebSocket connections to 10"
        action: "Configure WebSocket handler with MaxConnections=10"
        expected: "Handler configured"
      - name: "Open 20 concurrent WebSocket connections simultaneously"
        action: "Launch 20 goroutines each opening ws:// connection with valid JWT"
        expected: "Exactly 10 connections accepted, 10 rejected"
      - name: "Verify connection count accuracy"
        action: "Check handler.ConnectionCount()"
        expected: "Returns exactly 10 (not 11+ from race condition)"
      - name: "Close all connections and verify cleanup"
        action: "Close all 10 accepted connections"
        expected: "ConnectionCount() returns 0"
    tags: [regression, websocket, concurrency, over-admission, max-connections, mutex]
    estimated_duration: "10s"
    expected_result: "Mutex-protected connection counter prevents over-admission beyond MaxConnections"
    fix_reference:
      bug_id: "phase1-websocket-over-admission"
      description: "connCount check and increment were not atomic, allowing more than MaxConnections under concurrent connection bursts"
      fix_file: "catalog-api/internal/handlers/websocket_handler.go"

  - id: FIX-016
    name: "Watcher Stop() drains debounce timers"
    category: regression
    priority: high
    platforms: [api]
    steps:
      - name: "Create watcher on a directory"
        action: "Create Watcher monitoring a temp directory with 500ms debounce"
        expected: "Watcher started, monitoring directory"
      - name: "Write files to trigger events"
        action: "Create 10 files rapidly in the watched directory"
        expected: "Events debounced and coalesced"
      - name: "Call Stop() immediately after file writes"
        action: "Call watcher.Stop() within 100ms of last file write (while debounce timer still pending)"
        expected: "Stop() drains pending timers and returns within 2 seconds"
      - name: "Verify no goroutine leak"
        action: "runtime.NumGoroutine() after Stop()"
        expected: "No lingering debounce timer goroutines"
    tags: [regression, watcher, stop, debounce, timer-drain, goroutine]
    estimated_duration: "5s"
    expected_result: "Watcher.Stop() cancels all pending debounce timers before returning"
    fix_reference:
      bug_id: "phase1-watcher-stop-debounce"
      description: "Watcher.Stop() did not cancel pending debounce timers, leaving goroutines running after Stop() returned"
      fix_file: "Watcher/watcher.go"

  - id: FIX-017
    name: "CacheService cleanup cancels on shutdown"
    category: regression
    priority: high
    platforms: [api]
    steps:
      - name: "Create CacheService with 1-second cleanup interval"
        action: "NewCacheService(WithCleanupInterval(1*time.Second))"
        expected: "Service started with background cleanup goroutine"
      - name: "Add 100 entries with 500ms TTL"
        action: "Set 100 cache entries with short TTL"
        expected: "All entries added"
      - name: "Call Close() immediately"
        action: "Call cacheService.Close()"
        expected: "Close() returns within 2 seconds (cleanup goroutine cancelled)"
      - name: "Verify double Close() is safe"
        action: "Call Close() again"
        expected: "No panic, no-op via sync.Once"
      - name: "Verify no goroutine leak"
        action: "runtime.NumGoroutine() after Close()"
        expected: "Cleanup goroutine exited"
    tags: [regression, cache, cleanup, shutdown, goroutine, sync-once]
    estimated_duration: "5s"
    expected_result: "CacheService.Close() cancels cleanup goroutine via context and uses sync.Once for safety"
    fix_reference:
      bug_id: "phase1-cache-cleanup-shutdown"
      description: "CacheService cleanup goroutine was not cancelled on Close(), running indefinitely after service shutdown"
      fix_file: "Cache/cache.go"

  - id: FIX-018
    name: "WebSocket context no reconnection storm"
    category: regression
    priority: critical
    platforms: [web]
    steps:
      - name: "Open web app and connect WebSocket"
        action: "Navigate to http://localhost:3000, login, verify WebSocket connected"
        expected: "Single WebSocket connection established"
      - name: "Simulate server disconnect"
        action: "Kill catalog-api process briefly (2 seconds) then restart"
        expected: "WebSocket disconnects"
      - name: "Verify reconnection with exponential backoff"
        action: "Monitor browser network tab for WebSocket connection attempts"
        expected: "Reconnection attempts spaced with increasing delays (1s, 2s, 4s, ...), not rapid-fire"
      - name: "Verify single connection after reconnect"
        action: "After server is back, check WebSocket connection count in browser"
        expected: "Exactly 1 active WebSocket connection (not multiple from a reconnection storm)"
    tags: [regression, websocket, reconnection, storm, exponential-backoff, web]
    estimated_duration: "30s"
    expected_result: "WebSocket reconnection uses exponential backoff; no storm of parallel reconnection attempts"
    fix_reference:
      bug_id: "phase2-websocket-reconnection-storm"
      description: "WebSocketContext had no backoff on reconnection, causing rapid-fire connection attempts that overwhelmed the server after brief disconnects"
      fix_file: "catalog-web/src/contexts/WebSocketContext.tsx"

  - id: FIX-019
    name: "AuthContext single permissions effect"
    category: regression
    priority: high
    platforms: [web]
    steps:
      - name: "Login to web app"
        action: "Navigate to http://localhost:3000, login as admin"
        expected: "Dashboard loads"
      - name: "Verify permissions loaded once"
        action: "Open browser DevTools Network tab, filter for /api/v1/auth/permissions"
        expected: "Exactly 1 request to permissions endpoint per login (not multiple from duplicate effects)"
      - name: "Navigate to multiple pages"
        action: "Click through Dashboard, Browse, Settings, back to Dashboard"
        expected: "No additional /api/v1/auth/permissions requests (permissions cached in AuthContext)"
      - name: "Verify no React strict mode double-fetch"
        action: "Check Network tab for duplicate permission calls"
        expected: "Zero duplicate permission requests"
    tags: [regression, auth, permissions, react-effect, dedup, web]
    estimated_duration: "20s"
    expected_result: "AuthContext fetches permissions exactly once per login session"
    fix_reference:
      bug_id: "phase2-authcontext-duplicate-permissions"
      description: "AuthContext useEffect for permissions had missing dependency array causing re-fetch on every render cycle"
      fix_file: "Auth-Context-React/src/AuthContext.tsx"

  - id: FIX-020
    name: "UploadManager timer cleared on rapid calls"
    category: regression
    priority: high
    platforms: [web]
    steps:
