    tags: [phase1, gocore, scrcpy, regression, openclawing3, FIX-OC3-011]
    estimated_duration: "2s"
    expected_result: "Touch events match scrcpy v3 wire format exactly, not v1.x"
    fix_reference:
      bug_id: "FIX-OC3-011"
      description: "OpenClawing3 §6.5 used v1.x control packet layout missing action_button/buttons uint32 fields"
      fix_file: "pkg/bridge/scrcpy/protocol.go"
      fix_commit: "pending"

  - id: P1G-SCRCPY-003
    name: "pkg/bridge/scrcpy: .devignore enforcement gate blocks listed devices"
    category: security
    priority: critical
    platforms: [all]
    steps:
      - name: "TestEnforceDevIgnore_Blocked fires ErrDeviceBlocked on match"
        action: "go test -run 'TestEnforceDevIgnore_Blocked' -count=1 ./pkg/bridge/scrcpy/..."
        expected: "PASS — errors.Is(err, ErrDeviceBlocked) is true for ATMOSphere match"
      - name: "TestEnforceDevIgnore_Safe allows non-listed device"
        action: "go test -run 'TestEnforceDevIgnore_Safe' -count=1 ./pkg/bridge/scrcpy/..."
        expected: "PASS"
      - name: "TestEnforceDevIgnore_NoIgnoreFile tolerates missing file"
        action: "go test -run 'TestEnforceDevIgnore_NoIgnoreFile' -count=1 ./pkg/bridge/scrcpy/..."
        expected: "PASS — missing .devignore is allowed (no error)"
    tags: [phase1, gocore, scrcpy, devguard, security, constitution]
    estimated_duration: "3s"
    expected_result: ".devignore is enforced before any control socket is opened, per CLAUDE.md"
    fix_reference:
      bug_id: "OPENCLAWING4-PHASE1-M3-DEVGUARD"
      description: "Every scrcpy entry point MUST pass through EnforceDevIgnore; matches CLAUDE.md .devignore policy"
      fix_file: "pkg/bridge/scrcpy/devguard.go"
      fix_commit: "pending"

  # ==================== Full-repo gates ====================

  - id: P1G-FULL-001
    name: "Full repo builds, vets, and passes the no-sudo hook"
    category: security
    priority: critical
    platforms: [all]
    steps:
      - name: "Full build"
        action: "go build ./..."
        expected: "exit 0"
      - name: "go vet clean"
        action: "go vet ./..."
        expected: "no diagnostics"
      - name: "no-sudo hook against every Phase-1 Go-core file"
        action: "./scripts/hooks/no-sudo.sh pkg/capture/frames/frame.go pkg/bridge/sidecarutil/framing.go pkg/bridge/scrcpy/protocol.go pkg/bridge/scrcpy/devguard.go pkg/bridge/scrcpy/doc.go pkg/bridge/scrcpy/server.go pkg/bridge/scrcpy/session.go pkg/navigator/linux/uinput/doc.go pkg/navigator/linux/uinput/event.go pkg/navigator/linux/uinput/device_linux.go pkg/bridges/registry.go"
        expected: "exit 0 (no bare 'sudo' in any Phase-1 Go-core file)"
    tags: [phase1, gocore, build, vet, security]
    estimated_duration: "30s"
    expected_result: "Phase 1 Go-core is build-ready and constitutionally clean"
    fix_reference:
      bug_id: "OPENCLAWING4-PHASE1-GATE"
      description: "Nothing ships broken — build + vet + hook must all be green"
      fix_file: "multiple"
      fix_commit: "pending"

