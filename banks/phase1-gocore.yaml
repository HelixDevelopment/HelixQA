        action: "go test -run 'TestSession_Send_RoundTrip' -count=1 ./pkg/bridge/scrcpy/..."
        expected: "PASS — receiver sees CtrlResetVideo byte"
      - name: "Session.Close idempotency"
        action: "go test -run 'TestSession_Close_Idempotent' -count=1 ./pkg/bridge/scrcpy/..."
        expected: "PASS — second Close returns nil"
      - name: "Session.StartPumps delivers video packet"
        action: "go test -run 'TestSession_StartPumps_VideoStream' -count=1 -race ./pkg/bridge/scrcpy/..."
        expected: "PASS — one packet reaches videoCh within 1s; PTS + payload length correct"
    tags: [phase1, gocore, scrcpy, session, unit]
    estimated_duration: "4s"
    expected_result: "Session API honours its contract: single control writer, idempotent Close, buffered pumps"
    fix_reference:
