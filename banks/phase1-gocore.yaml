      bug_id: "OPENCLAWING4-PHASE1-M7"
      description: "Generic exec-based capture sidecar runner — foundation for portal/kmsgrab/x11grab backends"
      fix_file: "pkg/capture/linux/sidecar.go"
      fix_commit: "pending"

  # ==================== M8: pkg/capture/linux router ====================

