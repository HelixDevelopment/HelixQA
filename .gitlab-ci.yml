image: golang:1.24

stages:
  - test

test:
  stage: test
  before_script:
    # HelixQA depends on sibling modules via replace directives in go.mod.
    # Clone them to the expected relative paths so go tooling can resolve them.
    - git clone --depth=1 https://github.com/vasic-digital/Challenges.git ../Challenges
    - git clone --depth=1 https://github.com/vasic-digital/Containers.git ../Containers
    - git clone --depth=1 https://github.com/vasic-digital/DocProcessor.git ../../DocProcessor
    - git clone --depth=1 https://github.com/vasic-digital/LLMOrchestrator.git ../../LLMOrchestrator
    - git clone --depth=1 https://github.com/vasic-digital/VisionEngine.git ../../VisionEngine
  script:
    - go vet ./...
    - go test ./... -race -count=1 -timeout 180s
    - go build ./...
